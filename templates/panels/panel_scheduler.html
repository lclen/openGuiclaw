<!-- Scheduler Panel -->
<div x-show="activePanel === 'scheduler'"
    class="h-full flex flex-col relative bg-[var(--noble-black-800)]/40 backdrop-blur-md">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-3.5 border-b border-white/5 shrink-0">
        <div>
            <h2 class="text-[var(--noble-black-100)] font-bold text-[14px] tracking-wide">自动化执行计划</h2>
            <p class="text-[var(--noble-black-500)] text-[10px] mt-0.5 font-medium">定时触发 AI 指令执行与系统同步</p>
        </div>
        <div class="flex gap-1.5">
            <button @click="loadSchedulerTasks()"
                class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-400)] hover:text-white hover:bg-white/5 rounded-lg transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
            <button @click="openSchedulerForm()"
                class="px-3.5 py-1.5 bg-[var(--stem-green-500)] hover:bg-[var(--stem-green-400)] text-[var(--noble-black-900)] rounded-lg transition-all active:scale-95 font-bold text-[10px] uppercase tracking-wider">
                新建计划
            </button>
        </div>
    </div>

    <!-- Empty State -->
    <div x-show="!showSchedulerForm && schedulerTasks.length === 0"
        class="flex-1 flex flex-col items-center justify-center text-[var(--noble-black-500)] py-20 opacity-30">
        <p class="text-[12px] font-bold uppercase tracking-widest">暂无活跃计划项</p>
        <p class="text-[10px] mt-2 font-medium">点击上方按钮开始配置自动化工作流</p>
    </div>

    <!-- Task List -->
    <div x-show="!showSchedulerForm && schedulerTasks.length > 0"
        class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-2.5">
        <template x-for="task in schedulerTasks" :key="task.id">
            <div
                class="bg-[var(--noble-black-800)] border border-white/5 rounded-xl p-4 hover:bg-[var(--noble-black-700)] transition-all">
                <div class="flex items-start justify-between">
                    <div class="flex-1 min-w-0">
                        <div class="flex items-center gap-2 mb-1.5 flex-wrap">
                            <h3 class="text-[13px] font-bold text-[var(--noble-black-100)] mr-1.5" x-text="task.name">
                            </h3>
                            <span class="px-1.5 py-0.5 text-[8.5px] font-bold rounded uppercase"
                                :class="task.enabled ? 'bg-[var(--stem-green-500)]/10 text-[var(--stem-green-500)] border border-[var(--stem-green-500)]/20' : 'bg-[var(--noble-black-800)] text-[var(--noble-black-500)]'"
                                x-text="task.enabled ? '已激活' : '已暂停'"></span>
                            <span
                                class="px-1.5 py-0.5 text-[8.5px] font-bold rounded uppercase bg-[var(--noble-black-800)] text-[var(--noble-black-400)] border border-white/5"
                                x-text="{task:'指令任务',reminder:'提醒任务',system:'系统任务'}[task.task_type] || task.task_type"></span>
                        </div>
                        <p class="text-[11px] text-[var(--noble-black-400)] mt-1.5 leading-relaxed"
                            x-text="task.description"></p>
                    </div>

                    <div class="flex items-center gap-3 ml-4">
                        <template x-if="task.task_type !== 'system'">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" :checked="task.enabled" class="sr-only peer"
                                    @change="toggleSchedulerTask(task.id, $event.target.checked)">
                                <div
                                    class="w-8 h-4 bg-[var(--noble-black-600)] rounded-full peer peer-checked:bg-[var(--stem-green-500)] relative transition-all">
                                    <div
                                        class="absolute left-1 top-1 w-2 h-2 bg-white rounded-full peer-checked:translate-x-4 transition-all">
                                    </div>
                                </div>
                            </label>
                        </template>

                        <div class="flex gap-1">
                            <button @click="triggerSchedulerTask(task.id)"
                                class="w-7 h-7 flex items-center justify-center bg-[var(--noble-black-600)] hover:text-white rounded-md transition-all"
                                title="立即执行">
                                <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24">
                                    <path d="M8 5v14l11-7z" />
                                </svg>
                            </button>
                            <template x-if="task.deletable !== false && task.task_type !== 'system'">
                                <button @click="editSchedulerTask(task)"
                                    class="w-7 h-7 flex items-center justify-center bg-[var(--noble-black-600)] hover:text-blue-400 rounded-md transition-all"
                                    title="编辑">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                                    </svg>
                                </button>
                            </template>
                            <template x-if="task.deletable !== false && task.task_type !== 'system'">
                                <button @click="deleteSchedulerTask(task.id)"
                                    class="w-7 h-7 flex items-center justify-center bg-[var(--noble-black-600)] hover:text-rose-500 rounded-md transition-all"
                                    title="删除">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                    </svg>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>

                <div class="mt-3.5 grid grid-cols-2 gap-2 text-sm">
                    <div class="bg-black/20 rounded-lg p-2 border border-white/5">
                        <span
                            class="block text-[8px] font-bold uppercase text-[var(--noble-black-500)] mb-1">最近执行</span>
                        <span class="text-[10px] font-mono font-medium text-[var(--noble-black-300)]"
                            x-text="task.last_run ? new Date(task.last_run).toLocaleString() : '从未运行'"></span>
                    </div>
                    <div class="bg-black/20 rounded-lg p-2 border border-white/5">
                        <span
                            class="block text-[8px] font-bold uppercase text-[var(--noble-black-500)] mb-1">下次执行</span>
                        <span class="text-[10px] font-mono font-medium text-[var(--stem-green-500)]"
                            x-text="task.next_run ? new Date(task.next_run).toLocaleString() : '等待信号'"></span>
                    </div>
                </div>
            </div>
        </template>
    </div>

    <!-- Form Overlay -->
    <div x-show="showSchedulerForm"
        class="absolute inset-0 bg-[var(--noble-black-900)]/98 backdrop-blur-xl z-20 flex flex-col p-5 overflow-y-auto custom-scrollbar"
        style="display: none;" x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-4" x-transition:enter-end="opacity-100 translate-y-0">

        <div class="flex items-center justify-between mb-6">
            <div>
                <h3 class="text-lg font-bold text-white" x-text="schedulerFormData.id ? '修改计划任务' : '创建新计划任务'"></h3>
                <p class="text-[10px] text-[var(--noble-black-500)] mt-0.5 font-medium uppercase tracking-wider">
                    配置自动化执行逻辑与触发步频</p>
            </div>
            <button @click="closeSchedulerForm()"
                class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-500)] hover:text-white rounded-lg hover:bg-white/5 transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <form @submit.prevent="saveSchedulerTask" class="space-y-4 pb-12">
            <!-- Basic Info -->
            <div class="space-y-3.5">
                <div class="flex gap-3">
                    <div class="flex-1">
                        <label
                            class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider mb-1.5 px-1">任务识别名称
                            *</label>
                        <input type="text" x-model="schedulerFormData.name" required placeholder="任务标识符..."
                            class="w-full px-3.5 py-2.5 bg-[var(--noble-black-800)] border border-white/5 rounded-lg text-white text-[12px] focus:outline-none focus:border-[var(--stem-green-500)]/40 transition-all font-medium">
                    </div>
                    <div class="shrink-0">
                        <label
                            class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider mb-1.5 px-1">状态</label>
                        <div
                            class="flex items-center h-[38px] bg-[var(--noble-black-800)] px-3 rounded-lg border border-white/5">
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" x-model="schedulerFormData.enabled" class="sr-only peer">
                                <div
                                    class="w-8 h-4 bg-[var(--noble-black-600)] rounded-full peer peer-checked:bg-[var(--stem-green-500)] relative transition-all">
                                    <div
                                        class="absolute left-1 top-1 w-2 h-2 bg-white rounded-full peer-checked:translate-x-4 transition-all">
                                    </div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
                <div>
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider mb-1.5 px-1">任务备注描述</label>
                    <input type="text" x-model="schedulerFormData.description" placeholder="可选备注说明..."
                        class="w-full px-3.5 py-2.5 bg-[var(--noble-black-800)] border border-white/5 rounded-lg text-white text-[12px] focus:outline-none">
                </div>
            </div>

            <!-- Task Behavior -->
            <div class="p-4 bg-[var(--noble-black-800)]/50 border border-white/5 rounded-xl space-y-4">
                <div>
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider mb-2 px-1">执行模式协议</label>
                    <div class="grid grid-cols-2 gap-2">
                        <button type="button" @click="schedulerFormData.task_type = 'task'"
                            :class="schedulerFormData.task_type === 'task' ? 'bg-[var(--noble-black-600)] text-white border-white/10' : 'bg-[var(--noble-black-900)] text-[var(--noble-black-500)] border-white/5'"
                            class="py-2 rounded-lg border font-bold text-[10px] transition-all uppercase tracking-wider">AI
                            指令执行</button>
                        <button type="button" @click="schedulerFormData.task_type = 'reminder'"
                            :class="schedulerFormData.task_type === 'reminder' ? 'bg-[var(--noble-black-600)] text-white border-white/10' : 'bg-[var(--noble-black-900)] text-[var(--noble-black-500)] border-white/5'"
                            class="py-2 rounded-lg border font-bold text-[10px] transition-all uppercase tracking-wider">系统通知提醒</button>
                    </div>
                </div>

                <div x-show="schedulerFormData.task_type === 'task'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">交互指令
                        Payload *</label>
                    <textarea x-model="schedulerFormData.prompt" rows="3" placeholder="定义此周期内 AI 需达成的目标..."
                        class="w-full px-3.5 py-2.5 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-[12px] focus:outline-none focus:border-[var(--stem-green-500)]/40 transition-all font-medium resize-none"></textarea>
                </div>

                <div x-show="schedulerFormData.task_type === 'reminder'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">消息通知
                        Payload *</label>
                    <textarea x-model="schedulerFormData.reminder_message" rows="2" placeholder="输入要推送的提醒文字..."
                        class="w-full px-3.5 py-2.5 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-[12px] focus:outline-none focus:border-[var(--stem-green-500)]/40 transition-all font-medium resize-none"></textarea>
                </div>
            </div>

            <!-- Trigger Configuration -->
            <div class="p-4 bg-[var(--noble-black-800)]/50 border border-white/5 rounded-xl space-y-4">
                <div class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">调度策略协议</label>
                    <select x-model="schedulerFormData.trigger_type"
                        class="w-full px-3 py-2.5 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-[12px] outline-none">
                        <option value="once">单次执行 (Once)</option>
                        <option value="daily">每日循环 (Daily)</option>
                        <option value="weekly">每周循环 (Weekly)</option>
                        <option value="monthly">每月循环 (Monthly)</option>
                        <option value="interval">固定步频 (Interval)</option>
                        <option value="cron">Cron 表达式 (Advanced)</option>
                    </select>
                </div>

                <!-- One Time -->
                <div x-show="schedulerFormData.trigger_type === 'once'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">设定具体执行时间</label>
                    <input type="datetime-local" x-model="schedulerFormData.trigger_config_onceTime"
                        class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white font-mono text-[12px]">
                </div>

                <!-- Daily/Weekly/Monthly Time -->
                <div x-show="['daily', 'weekly', 'monthly'].includes(schedulerFormData.trigger_type)"
                    class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">特定时刻执行点</label>
                    <input type="time" x-model="schedulerFormData.trigger_preset_time"
                        class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white font-mono text-center text-lg font-bold">
                </div>

                <!-- Weekly Day -->
                <div x-show="schedulerFormData.trigger_type === 'weekly'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">选择目标星期</label>
                    <div class="grid grid-cols-7 gap-1">
                        <template
                            x-for="[val, label] in [['1','一'],['2','二'],['3','三'],['4','四'],['5','五'],['6','六'],['0','日']]"
                            :key="val">
                            <button type="button" @click="schedulerFormData.trigger_preset_weekday = val"
                                :class="schedulerFormData.trigger_preset_weekday === val ? 'bg-[var(--stem-green-500)] text-[var(--noble-black-900)] border-[var(--stem-green-500)]' : 'bg-[var(--noble-black-900)] text-[var(--noble-black-500)] border-white/5'"
                                class="py-1.5 rounded font-bold text-[9.5px] border" x-text="label"></button>
                        </template>
                    </div>
                </div>

                <!-- Monthly Day -->
                <div x-show="schedulerFormData.trigger_type === 'monthly'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">特定日期（1-31）</label>
                    <input type="number" min="1" max="31" x-model="schedulerFormData.trigger_preset_day"
                        class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-center text-lg font-bold">
                </div>

                <!-- Interval -->
                <div x-show="schedulerFormData.trigger_type === 'interval'" class="grid grid-cols-2 gap-3">
                    <div class="space-y-1.5">
                        <label
                            class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">间隔时数</label>
                        <input type="number" x-model.number="schedulerFormData.trigger_config_intervalHours"
                            class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-center text-lg font-bold">
                    </div>
                    <div class="space-y-1.5">
                        <label
                            class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">间隔分数</label>
                        <input type="number" x-model.number="schedulerFormData.trigger_config_intervalMinutes"
                            class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-white text-center text-lg font-bold">
                    </div>
                </div>

                <!-- Cron -->
                <div x-show="schedulerFormData.trigger_type === 'cron'" class="space-y-1.5">
                    <label
                        class="block text-[10px] font-bold text-[var(--noble-black-500)] uppercase tracking-wider px-1">Cron
                        协议表达式</label>
                    <input type="text" x-model="schedulerFormData.trigger_config_cron" placeholder="* * * * *"
                        class="w-full px-3 py-2 bg-[var(--noble-black-900)] border border-white/5 rounded-lg text-amber-500 font-mono text-[14px] focus:outline-none">
                </div>
            </div>

            <!-- Submit -->
            <div class="flex items-center gap-3 pt-4">
                <button type="button" @click="closeSchedulerForm()"
                    class="flex-1 py-3 bg-[var(--noble-black-800)] hover:bg-[var(--noble-black-700)] border border-white/10 text-[var(--noble-black-400)] font-bold rounded-lg transition-all text-[11px] uppercase tracking-wider">
                    取消
                </button>
                <button type="submit"
                    class="flex-[1.5] py-3 bg-[var(--stem-green-500)] hover:bg-[var(--stem-green-400)] text-[var(--noble-black-900)] font-bold rounded-lg transition-all shadow-md text-[11px] uppercase tracking-wider">
                    同步并保存
                </button>
            </div>
        </form>
    </div>
</div>
