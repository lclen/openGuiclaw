<!-- Debug Panel -->
<div x-show="activePanel === 'debug'" class="flex flex-col h-full bg-[var(--noble-black-900)]/40 backdrop-blur-3xl">
    <div class="px-6 py-3.5 border-b border-white/5 bg-black/20 shrink-0">
        <div class="flex items-start justify-between">
            <div>
                <h2 class="text-[14px] font-bold text-white tracking-wide uppercase">底层调试引擎</h2>
                <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight mt-0.5"
                    x-text="`${debugLogs.length} 条截获的事件流`"></p>
            </div>
            <button @click="debugLogs = []"
                class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-500)] hover:text-rose-500 hover:bg-rose-500/10 rounded-lg transition-all mt-0.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
        <!-- Context status expandable card -->
        <div x-show="contextStatus" @click="expandedContext = !expandedContext"
            class="mt-4 bg-[var(--noble-black-800)] border border-white/5 rounded-xl p-3.5 cursor-pointer hover:bg-[var(--noble-black-700)] hover:border-[var(--stem-green-500)]/30 transition-all group shadow-sm">
            <div class="flex items-center justify-between gap-2">
                <div class="flex items-center gap-2">
                    <span class="w-1.5 h-1.5 rounded-full bg-[var(--stem-green-500)] animate-pulse"></span>
                    <span
                        class="text-[var(--noble-black-100)] text-[11px] font-bold tracking-wider uppercase">当前感知状态</span>
                </div>
                <svg class="w-4 h-4 text-[var(--noble-black-500)] group-hover:text-[var(--stem-green-500)] transition-all shrink-0"
                    :class="expandedContext ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
            <p class="text-[var(--noble-black-300)] text-[11px] font-mono mt-2.5 leading-relaxed select-text tracking-tight"
                :class="expandedContext ? 'break-words' : 'line-clamp-2'" x-text="contextStatus"></p>
        </div>
    </div>

    <div id="debug-container" class="flex-1 overflow-y-auto custom-scrollbar px-2 py-2 font-mono">
        <template x-for="(log, i) in debugLogs" :key="i">
            <div
                class="px-4 py-2 border-b border-white/5 hover:bg-[var(--noble-black-800)]/60 transition-colors rounded-lg mb-0.5">
                <div class="flex items-start gap-3">
                    <span
                        class="text-[var(--noble-black-500)] text-[10px] leading-5 flex-shrink-0 w-12 text-right font-bold"
                        x-text="log.ts"></span>
                    <span
                        class="text-[9px] px-1.5 py-0.5 rounded flex-shrink-0 leading-tight mt-0.5 font-bold uppercase tracking-widest border"
                        :class="{
                            'bg-yellow-500/10 text-yellow-500 border-yellow-500/20': log.type === 'status',
                            'bg-blue-500/10 text-blue-400 border-blue-500/20': log.type === 'tool_call',
                            'bg-[var(--stem-green-500)]/10 text-[var(--stem-green-500)] border-[var(--stem-green-500)]/20': log.type === 'tool_result',
                            'bg-rose-500/10 text-rose-500 border-rose-500/20': log.type === 'error',
                            'bg-purple-500/10 text-purple-400 border-purple-500/20': log.type === 'message',
                            'bg-cyan-500/10 text-cyan-400 border-cyan-500/20': log.type === 'context',
                            'bg-emerald-500/10 text-emerald-400 border-emerald-500/20': log.type === 'system',
                            'bg-[var(--noble-black-800)] text-[var(--noble-black-400)] border-white/10': !['status','tool_call','tool_result','error','message','context','system'].includes(log.type)
                        }" x-text="log.type"></span>
                    <span class="text-[var(--noble-black-200)] text-[11px] leading-relaxed break-all font-medium"
                        x-text="log.text"></span>
                </div>
            </div>
        </template>
        <div x-show="debugLogs.length === 0"
            class="flex flex-col items-center justify-center py-20 px-6 text-[var(--noble-black-500)] opacity-50">
            <svg class="w-10 h-10 mb-3 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4" />
            </svg>
            <p class="text-[11px] font-bold uppercase tracking-widest">终端侦查器就绪</p>
            <p class="text-[9px] mt-1 font-medium">挂起并等待内核事件...</p>
        </div>
    </div>
</div>
