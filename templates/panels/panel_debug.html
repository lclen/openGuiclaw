<!-- Debug Panel -->
<div x-show="activePanel === 'debug'" class="flex flex-col h-full">
    <div class="px-4 py-3 border-b border-white/10">
        <div class="flex items-start justify-between">
            <div>
                <p class="text-white font-semibold text-sm">调试日志</p>
                <p class="text-white/40 text-xs mt-0.5" x-text="`${debugLogs.length} 条事件`"></p>
            </div>
            <button @click="debugLogs = []"
                class="text-white/30 hover:text-red-400 text-xs transition-colors mt-0.5">清空</button>
        </div>
        <!-- Context status expandable card -->
        <div x-show="contextStatus" @click="expandedContext = !expandedContext"
            class="mt-3 bg-cyan-950/40 border border-cyan-800/50 rounded p-2.5 cursor-pointer hover:bg-cyan-900/40 transition-colors group">
            <div class="flex items-center justify-between gap-2">
                <span class="text-cyan-400 text-xs font-semibold shrink-0">当前感知状态</span>
                <svg class="w-3.5 h-3.5 text-cyan-600 group-hover:text-cyan-400 transition-all shrink-0"
                    :class="expandedContext ? 'rotate-180' : ''" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
            <p class="text-cyan-200/80 text-xs mt-1.5 leading-relaxed select-text"
                :class="expandedContext ? 'break-words' : 'line-clamp-2'" x-text="contextStatus"></p>
        </div>
    </div>
    <div id="debug-container" class="flex-1 overflow-y-auto custom-scrollbar py-1 font-mono">
        <template x-for="(log, i) in debugLogs" :key="i">
            <div class="px-3 py-1 border-b border-white/5 hover:bg-white/5 transition-colors">
                <div class="flex items-start gap-2">
                    <span class="text-white/25 text-xs leading-5 flex-shrink-0 w-10 text-right"
                        x-text="log.ts"></span>
                    <span class="text-xs px-1.5 py-0.5 rounded flex-shrink-0 leading-4 mt-0.5" :class="{
                            'bg-yellow-500/20 text-yellow-300': log.type === 'status',
                            'bg-blue-500/20 text-blue-300': log.type === 'tool_call',
                            'bg-green-500/20 text-green-300': log.type === 'tool_result',
                            'bg-red-500/20 text-red-300': log.type === 'error',
                            'bg-purple-500/20 text-purple-300': log.type === 'message',
                            'bg-cyan-500/20 text-cyan-300': log.type === 'context',
                            'bg-emerald-500/20 text-emerald-300': log.type === 'system',
                            'bg-white/10 text-white/50': !['status','tool_call','tool_result','error','message','context','system'].includes(log.type)
                        }" x-text="log.type"></span>
                    <span class="text-white/70 text-xs leading-relaxed break-all" x-text="log.text"></span>
                </div>
            </div>
        </template>
        <div x-show="debugLogs.length === 0" class="px-4 py-8 text-center text-white/20 text-xs">等待事件...</div>
    </div>
</div>
