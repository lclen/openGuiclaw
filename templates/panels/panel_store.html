<!-- Store Panel -->
<div x-show="activePanel === 'store'"
    class="flex flex-col h-full w-full bg-[var(--noble-black-900)]/40 backdrop-blur-3xl">
    <div class="px-6 py-3.5 border-b border-white/5 bg-black/20 shrink-0 flex justify-between items-center">
        <div>
            <h2 class="text-[14px] font-bold text-white tracking-wide uppercase">VRM 资源商店 (Store)</h2>
            <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight mt-0.5">从云端神经中枢加载看板娘与动作</p>
        </div>
        <button @click="loadStoreItems()"
            class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-500)] hover:text-[var(--stem-green-500)] hover:bg-[var(--stem-green-500)]/10 rounded-lg transition-all mt-0.5">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </div>
    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-4"
        x-init="$watch('activePanel', val => { if(val === 'store') loadStoreItems() })">

        <div x-show="storeLoading"
            class="py-16 flex flex-col items-center justify-center text-[var(--noble-black-400)] opacity-60">
            <svg class="w-8 h-8 mb-4 animate-spin text-[var(--stem-green-500)]" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
            <span class="text-[11px] font-bold tracking-widest uppercase">建立云端神经链接...</span>
        </div>

        <div x-show="!storeLoading">
            <!-- Category Tabs -->
            <div class="flex items-center gap-2 mb-6 overflow-x-auto pb-2 invisible-scrollbar">
                <template x-for="cat in categories" :key="cat">
                    <button @click="selectedCategory = cat"
                        class="px-3.5 py-1.5 rounded-lg text-[11px] font-bold transition-all whitespace-nowrap border"
                        :class="selectedCategory === cat ? 'bg-[var(--stem-green-500)] text-[var(--noble-black-900)] border-[var(--stem-green-500)] shadow-lg shadow-[var(--stem-green-500)]/20 shadow-inner' : 'bg-[var(--noble-black-800)] text-[var(--noble-black-500)] border-white/5 hover:bg-[var(--noble-black-700)] hover:text-[var(--noble-black-200)]'"
                        x-text="cat"></button>
                </template>
            </div>

            <div class="flex items-center gap-2 px-0.5 mb-4 mt-2">
                <div class="w-1 h-3 rounded-full bg-blue-500/40"></div>
                <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">交互载体模型 (Avatars)
                </p>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-3.5 mb-8">
                <template x-for="item in filteredModels" :key="item.id">
                    <div
                        class="bg-[var(--noble-black-800)] border border-white/5 rounded-2xl overflow-hidden group flex flex-col h-full hover:bg-[var(--noble-black-700)] hover:border-[var(--stem-green-500)]/30 transition-all shadow-sm">
                        <div
                            class="aspect-[4/5] bg-[var(--noble-black-950)] relative flex items-center justify-center object-cover shrink-0 overflow-hidden">
                            <template x-if="item.thumb">
                                <img :src="item.thumb"
                                    class="absolute w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500">
                            </template>
                            <template x-if="!item.thumb">
                                <svg class="w-8 h-8 text-[var(--noble-black-600)]" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </template>
                            <template x-if="item.homepage">
                                <a :href="item.homepage" target="_blank"
                                    class="absolute top-2 right-2 p-1.5 bg-black/60 hover:bg-[var(--stem-green-500)] rounded-lg text-white/80 hover:text-black transition-all z-10 backdrop-blur-sm"
                                    title="访问 VRoid Hub">
                                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                    </svg>
                                </a>
                            </template>
                        </div>
                        <div class="p-3.5 flex flex-col flex-1">
                            <div class="flex-1">
                                <p class="text-[var(--noble-black-100)] text-[12px] font-bold truncate tracking-tight"
                                    x-text="item.name"></p>
                                <p class="text-[var(--noble-black-500)] text-[9px] font-medium truncate mb-2.5 mt-0.5"
                                    x-text="'Creator: @' + (item.author || 'Anonymous')"></p>
                            </div>
                            <button
                                @click="item.url ? downloadStoreItem(item, 'model') : window.open(item.homepage, '_blank')"
                                :disabled="!!item.url && (downloadingItems.includes(item.id) || isDownloaded(item))"
                                class="w-full py-2 rounded-lg text-[10.5px] font-bold transition-all border shadow-sm"
                                :class="{
                                    'bg-[var(--noble-black-900)] text-[var(--noble-black-500)] border-white/5 cursor-not-allowed': !!item.url && (downloadingItems.includes(item.id) || isDownloaded(item)),
                                    'bg-blue-500/10 text-blue-400 border-blue-500/20 hover:bg-blue-500 hover:text-white': !item.url || (!downloadingItems.includes(item.id) && !isDownloaded(item))
                                }">
                                <span
                                    x-text="!item.url ? '外部资源查看' : (downloadingItems.includes(item.id) ? '正在加载...' : (isDownloaded(item) ? '核心已部署' : '载入此模型'))"></span>
                            </button>
                        </div>
                    </div>
                </template>
                <div x-show="filteredModels.length === 0"
                    class="col-span-full text-center text-[var(--noble-black-500)] text-[10px] font-bold py-6 uppercase tracking-widest border border-dashed border-white/5 rounded-xl bg-[var(--noble-black-900)]/50">
                    子空间中未检测到可用模型实体</div>
            </div>

            <div class="flex items-center gap-2 px-0.5 mb-4">
                <div class="w-1 h-3 rounded-full bg-purple-500/40"></div>
                <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">物理骨骼动作
                    (Animations)</p>
            </div>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-6">
                <template x-for="anim in filteredAnimations" :key="anim.id">
                    <div
                        class="bg-[var(--noble-black-800)] hover:bg-[var(--noble-black-700)] border border-white/5 hover:border-[var(--stem-green-500)]/30 rounded-xl p-3.5 flex flex-col justify-between transition-all group shadow-sm">
                        <div class="flex items-center gap-2 mb-2">
                            <svg class="w-4 h-4 text-purple-400 opacity-60 group-hover:opacity-100 transition-opacity"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M14 10l-2 1m0 0l-2-1m2 1v2.5M20 7l-2 1m2-1l-2-1m2 1v2.5M14 4l-2-1-2 1M4 7l2-1M4 7l2 1M4 7v2.5M12 21l-2-1m2 1l2-1m-2 1v-2.5M6 18l-2-1v-2.5M18 18l2-1v-2.5" />
                            </svg>
                            <p class="text-[var(--noble-black-100)] text-[11px] font-bold truncate" x-text="anim.name">
                            </p>
                        </div>
                        <button
                            @click="anim.url ? downloadStoreItem(anim, 'animation') : (anim.homepage && window.open(anim.homepage, '_blank'))"
                            :disabled="!!anim.url && (downloadingItems.includes(anim.id) || isAnimationDownloaded(anim))"
                            class="mt-2 w-full py-1.5 rounded-lg text-[10px] font-bold transition-all border" :class="{
                                'bg-[var(--noble-black-900)] text-[var(--noble-black-500)] border-white/5 cursor-not-allowed': !!anim.url && (downloadingItems.includes(anim.id) || isAnimationDownloaded(anim)),
                                'bg-purple-500/10 text-purple-400 border-purple-500/20 hover:bg-purple-500 hover:text-white': !anim.url || (!downloadingItems.includes(anim.id) && !isAnimationDownloaded(anim))
                            }">
                            <span
                                x-text="!anim.url ? '外部动作查看' : (downloadingItems.includes(anim.id) ? '正在加载...' : (isAnimationDownloaded(anim) ? '动作已就绪' : '获取此动作'))"></span>
                        </button>
                    </div>
                </template>
                <div x-show="filteredAnimations.length === 0"
                    class="col-span-full text-center text-[var(--noble-black-500)] text-[10px] font-bold py-6 uppercase tracking-widest border border-dashed border-white/5 rounded-xl bg-[var(--noble-black-900)]/50">
                    姿态库中无可用动作记录</div>
            </div>
        </div>
    </div>
</div>
