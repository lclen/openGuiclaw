<!-- Store Panel -->
<div x-show="activePanel === 'store'" class="flex flex-col h-full w-full">
    <div class="px-4 py-3 border-b border-white/10 flex justify-between items-center">
        <div>
            <p class="text-white font-semibold text-sm">VRM 资源商店</p>
            <p class="text-white/40 text-xs mt-0.5">下载新的看板娘与动作</p>
        </div>
        <button @click="loadStoreItems()" class="text-white/40 hover:text-white/80 p-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </div>
    <div class="flex-1 overflow-y-auto custom-scrollbar px-4 py-3"
        x-init="$watch('activePanel', val => { if(val === 'store') loadStoreItems() })">

        <div x-show="storeLoading" class="py-8 text-center text-white/30 text-sm">连接商店中...</div>

        <div x-show="!storeLoading">
            <!-- Category Tabs -->
            <div class="flex items-center gap-1.5 mb-4 overflow-x-auto pb-1 invisible-scrollbar">
                <template x-for="cat in categories" :key="cat">
                    <button @click="selectedCategory = cat"
                        class="px-2.5 py-1 rounded-full text-[10px] font-medium transition-all whitespace-nowrap"
                        :class="selectedCategory === cat ? 'bg-blue-500 text-white shadow-lg shadow-blue-500/20' : 'bg-white/5 text-white/40 hover:bg-white/10 hover:text-white/60'"
                        x-text="cat"></button>
                </template>
            </div>

            <p class="text-blue-300 text-xs font-semibold mb-3">人物模型 (Models)</p>
            <div class="grid grid-cols-3 gap-3 mb-6">
                <template x-for="item in filteredModels" :key="item.id">
                    <div class="bg-white/5 border border-white/10 rounded-xl overflow-hidden group flex flex-col h-full hover:bg-white/10 transition-colors">
                        <div class="aspect-[3/4] bg-black/40 relative flex items-center justify-center object-cover shrink-0">
                            <template x-if="item.thumb">
                                <img :src="item.thumb" class="absolute w-full h-full object-cover opacity-60 group-hover:opacity-100 transition-opacity">
                            </template>
                            <template x-if="!item.thumb">
                                <svg class="w-8 h-8 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                </svg>
                            </template>
                            <template x-if="item.homepage">
                                <a :href="item.homepage" target="_blank"
                                    class="absolute top-1.5 right-1.5 p-1.5 bg-black/40 hover:bg-black/60 rounded-full text-white/80 hover:text-white transition-all z-10"
                                    title="访问 VRoid Hub">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                                    </svg>
                                </a>
                            </template>
                        </div>
        <div class="p-3 flex flex-col flex-1">
                            <div class="flex-1">
                                <p class="text-white/90 text-xs font-medium truncate" x-text="item.name"></p>
                                <p class="text-white/40 text-[10px] truncate mb-2" x-text="'@' + (item.author || '佚名')"></p>
                            </div>
                            <button
                                @click="item.url ? downloadStoreItem(item, 'model') : window.open(item.homepage, '_blank')"
                                :disabled="!!item.url && (downloadingItems.includes(item.id) || isDownloaded(item))"
                                class="w-full py-1.5 rounded-md text-[10px] font-medium transition-colors"
                                :class="{
                                    'bg-white/10 text-white/40 cursor-not-allowed': !!item.url && (downloadingItems.includes(item.id) || isDownloaded(item)),
                                    'bg-blue-500/20 text-blue-300 hover:bg-blue-500/40': !item.url || (!downloadingItems.includes(item.id) && !isDownloaded(item))
                                }">
                                <span x-text="!item.url ? '前往查看' : (downloadingItems.includes(item.id) ? '下载中...' : (isDownloaded(item) ? '已下载' : '下载模型'))"></span>
                            </button>
                        </div>
                    </div>
                </template>
                <div x-show="filteredModels.length === 0" class="col-span-2 text-center text-white/30 text-[10px] py-2">该分类下暂无模型</div>
            </div>

            <p class="text-purple-300 text-xs font-semibold mb-3">待机动作 (Animations)</p>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <template x-for="anim in filteredAnimations" :key="anim.id">
                    <div class="bg-white/5 border border-white/10 rounded-lg p-3 flex flex-col justify-between">
                        <div>
                            <p class="text-white/90 text-xs font-medium truncate mb-1" x-text="anim.name"></p>
                        </div>
                        <button
                            @click="anim.url ? downloadStoreItem(anim, 'animation') : (anim.homepage && window.open(anim.homepage, '_blank'))"
                            :disabled="!!anim.url && (downloadingItems.includes(anim.id) || isAnimationDownloaded(anim))"
                            class="mt-2 w-full py-1.5 rounded-md text-[10px] font-medium transition-colors"
                            :class="{
                                'bg-white/10 text-white/40 cursor-not-allowed': !!anim.url && (downloadingItems.includes(anim.id) || isAnimationDownloaded(anim)),
                                'bg-purple-500/20 text-purple-300 hover:bg-purple-500/40': !anim.url || (!downloadingItems.includes(anim.id) && !isAnimationDownloaded(anim))
                            }">
                            <span x-text="!anim.url ? '查看详情' : (downloadingItems.includes(anim.id) ? '下载中...' : (isAnimationDownloaded(anim) ? '已下载' : '获取动作'))"></span>
                        </button>
                    </div>
                </template>
                <div x-show="filteredAnimations.length === 0" class="col-span-2 text-center text-white/30 text-[10px] py-2">该分类下暂无动作</div>
            </div>
        </div>
    </div>
</div>
