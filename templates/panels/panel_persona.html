<!-- Persona & Model Configuration Panel -->
<div x-show="activePanel === 'persona'"
    class="flex flex-col h-full bg-[var(--noble-black-900)]/40 backdrop-blur-3xl overflow-hidden">
    <!-- Header -->
    <div class="px-6 py-3.5 border-b border-white/5 bg-black/20 shrink-0">
        <div class="flex items-center gap-3">
            <!-- Mobile Menu Toggle -->
            <button @click="sidebarOpen = true"
                class="md:hidden w-8 h-8 flex items-center justify-center bg-[var(--noble-black-700)] border border-white/10 rounded-lg text-[var(--noble-black-400)] active:scale-95 transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>
            <div
                class="w-8 h-8 rounded-lg bg-[var(--noble-black-700)] flex items-center justify-center border border-white/5 shadow-inner">
                <svg class="w-4 h-4 text-[var(--stem-green-500)]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                </svg>
            </div>
            <div>
                <h2 class="text-[13px] font-bold text-white tracking-wide uppercase">人格与视觉底座</h2>
                <div class="flex items-center gap-2 mt-0.5">
                    <span
                        class="w-1.5 h-1.5 rounded-full bg-[var(--stem-green-500)] shadow-[0_0_8px_rgba(34,211,238,0.6)]"></span>
                    <p class="text-[var(--noble-black-600)] text-[9px] font-medium">配置 3D 形象、视角快照与 AI 内核性格</p>
                </div>
            </div>
        </div>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-4 space-y-5">

        <!-- Text Personas -->
        <div class="space-y-2.5">
            <div class="flex items-center gap-2 px-0.5">
                <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40"></div>
                <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">人格基调矩阵 (Profile)
                </p>
            </div>
            <div class="grid grid-cols-1 gap-2">
                <template x-for="[name, content] in Object.entries(personas)" :key="name">
                    <div class="space-y-1.5 group">
                        <div class="flex items-center justify-between px-1">
                            <p class="text-[8px] font-bold text-[var(--noble-black-500)] uppercase tracking-widest"
                                x-text="name"></p>
                        </div>
                        <div
                            class="relative rounded-lg bg-[var(--noble-black-950)] border border-white/5 p-3 transition-all group-hover:border-[var(--stem-green-500)]/20 shadow-inner">
                            <pre class="text-[var(--noble-black-300)] text-[10.5px] leading-relaxed whitespace-pre-wrap max-h-32 overflow-y-auto custom-scrollbar font-medium"
                                x-text="content"></pre>
                        </div>
                    </div>
                </template>
                <div x-show="Object.keys(personas).length === 0"
                    class="flex items-center justify-center py-5 px-4 bg-white/5 rounded-lg border border-white/5 border-dashed">
                    <p class="text-[9px] font-bold text-[var(--noble-black-600)] uppercase tracking-widest">正在解析人格神经元...
                    </p>
                </div>
            </div>
        </div>

        <!-- Snapshots / Quick Controls -->
        <div class="space-y-2.5">
            <div class="flex items-center gap-2 px-0.5">
                <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40"></div>
                <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">视角与骨骼控制 (Camera)
                </p>
            </div>
            <div
                class="bg-[var(--noble-black-800)] border border-white/5 rounded-lg p-2.5 flex items-center justify-between gap-3 transition-all hover:bg-[var(--noble-black-700)] group/snapshot shadow-md">
                <div class="flex gap-2.5 items-center">
                    <div
                        class="w-8 h-8 rounded-md bg-[var(--noble-black-900)] border border-white/10 flex items-center justify-center text-[var(--noble-black-500)] group-hover/snapshot:text-[var(--stem-green-500)] transition-colors">
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z" />
                        </svg>
                    </div>
                    <div>
                        <p class="text-white text-[11px] font-bold">视角快照锁</p>
                        <p class="text-[var(--noble-black-400)] text-[9px] font-medium">冻结当前模型位姿关系</p>
                    </div>
                </div>
                <button @click="saveVrmConfig()" :disabled="saveVrmStatus === 'saving'"
                    class="shrink-0 h-8 px-3.5 rounded-md text-[9.5px] font-bold transition-all active:scale-95 shadow-lg flex items-center gap-1.5"
                    :class="{
                        'bg-[var(--stem-green-500)] text-[var(--noble-black-950)]': saveVrmStatus === '',
                        'bg-[var(--noble-black-800)] text-[var(--noble-black-600)]': saveVrmStatus === 'saving',
                        'bg-emerald-500 text-white': saveVrmStatus === 'ok',
                        'bg-rose-500 text-white': saveVrmStatus === 'error'
                    }">
                    <span
                        x-text="saveVrmStatus === '' ? '保存视角' : (saveVrmStatus === 'saving' ? '保存中...' : (saveVrmStatus === 'ok' ? '已保存' : '异常'))"></span>
                </button>
            </div>
        </div>

        <!-- Model Infrastructure -->
        <div class="space-y-3">
            <div class="flex justify-between items-center px-0.5">
                <div class="flex items-center gap-2">
                    <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40"></div>
                    <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">本地资产库 (Local
                        Models)</p>
                </div>
                <button @click="loadModels()"
                    class="w-6 h-6 flex items-center justify-center rounded-md bg-white/5 border border-white/10 text-[var(--noble-black-600)] hover:text-white transition-all">
                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </div>

            <div class="grid grid-cols-1 gap-1.5">
                <template x-for="model in vrmModels" :key="model.name">
                    <div class="group flex items-center gap-1.5">
                        <button @click="switchVrmModel(model.path)"
                            class="flex-1 text-left px-3 py-2.5 bg-[var(--noble-black-800)] border border-white/5 rounded-lg hover:bg-[var(--noble-black-700)] hover:border-[var(--stem-green-500)]/30 transition-all flex items-center justify-between">
                            <div class="flex items-center gap-2.5 truncate">
                                <div
                                    class="w-6 h-6 rounded bg-[var(--noble-black-900)] border border-white/5 flex items-center justify-center text-[var(--noble-black-400)]">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2"
                                            d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
                                    </svg>
                                </div>
                                <span class="text-[11px] font-bold text-[var(--noble-black-200)] truncate pr-2"
                                    x-text="model.name"></span>
                            </div>
                            <span
                                class="text-[7.5px] font-bold text-[var(--stem-green-500)] opacity-0 group-hover:opacity-100 uppercase tracking-widest bg-[var(--stem-green-500)]/5 px-1.5 py-0.5 rounded border border-[var(--stem-green-500)]/10">载入</span>
                        </button>
                        <button @click.prevent="deleteModel(model.name)"
                            class="w-8 h-8 rounded-lg bg-rose-500/5 text-rose-500/20 hover:text-rose-500 transition-all flex items-center justify-center opacity-0 group-hover:opacity-100">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </template>

                <div class="relative group mt-0.5">
                    <input type="file" accept=".vrm" @change="uploadModel($event)" :disabled="uploadingModel"
                        class="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20">
                    <div
                        class="w-full border border-dashed border-white/10 bg-[var(--noble-black-900)] rounded-lg p-4 text-center transition-all group-hover:border-[var(--stem-green-500)]/40 shadow-inner">
                        <div
                            class="mx-auto w-7 h-7 rounded-md bg-[var(--noble-black-800)] flex items-center justify-center mb-1.5 text-[var(--noble-black-400)] group-hover:text-[var(--stem-green-500)] transition-all">
                            <svg x-show="!uploadingModel" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                            </svg>
                            <svg x-show="uploadingModel" class="w-3.5 h-3.5 animate-spin" fill="none"
                                viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor"
                                    stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"></path>
                            </svg>
                        </div>
                        <p class="text-[10px] font-bold text-[var(--noble-black-300)] tracking-tight"
                            x-text="uploadingModel ? '正在同步字节...' : '增加本地视觉体 (.vrm)'"></p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Expression & Action -->
        <div class="space-y-5">
            <div class="space-y-2.5">
                <div class="flex items-center gap-2 px-0.5">
                    <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40"></div>
                    <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">表情干预
                        (Expressions)</p>
                </div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-1.5">
                    <template
                        x-for="exp in [{key: 'happy', label: '开心'}, {key: 'angry', label: '生气'}, {key: 'sad', label: '难过'}, {key: 'relaxed', label: '放松'}, {key: 'surprised', label: '惊讶'}]"
                        :key="exp.key">
                        <button @click="triggerExpression(exp.key)"
                            class="py-2.5 bg-[var(--noble-black-800)] hover:bg-[var(--stem-green-500)] border border-white/5 hover:border-[var(--stem-green-500)]/30 rounded-lg text-[10.5px] font-bold text-[var(--noble-black-200)] hover:text-[var(--noble-black-900)] transition-all shadow-sm">
                            <span x-text="exp.label"></span>
                        </button>
                    </template>
                    <button @click="triggerExpression('neutral')"
                        class="py-2.5 bg-[var(--noble-black-900)] border border-[var(--stem-green-500)]/40 rounded-lg text-[10.5px] font-bold text-[var(--stem-green-500)] hover:bg-[var(--stem-green-500)] hover:text-[var(--noble-black-900)] transition-all shadow-sm">重置核心位姿</button>
                </div>
            </div>

            <div class="space-y-2.5 pb-6">
                <div class="flex items-center gap-2 px-0.5">
                    <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40"></div>
                    <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">模型动作
                        (Animations)</p>
                </div>
                <div
                    class="grid grid-cols-1 sm:grid-cols-2 gap-1.5 max-h-[180px] overflow-y-auto custom-scrollbar no-scrollbar pr-1">
                    <template x-for="anim in vrmAnimations" :key="anim.path">
                        <button @click="triggerAction(anim.path)"
                            class="group py-2.5 px-3 bg-[var(--noble-black-800)] hover:bg-[var(--noble-black-700)] border border-white/5 hover:border-[var(--stem-green-500)]/30 rounded-lg transition-all text-left flex items-center justify-between shadow-sm">
                            <span
                                class="truncate text-[10.5px] font-bold text-[var(--noble-black-100)] group-hover:text-[var(--stem-green-500)]"
                                x-text="anim.name"></span>
                            <svg class="w-2.5 h-2.5 text-[var(--stem-green-500)] opacity-0 group-hover:opacity-100 transition-all shrink-0"
                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" />
                            </svg>
                        </button>
                    </template>
                </div>
            </div>
        </div>
    </div>
</div>
