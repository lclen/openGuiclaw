<!-- Persona & Model Configuration Panel -->
<div x-show="activePanel === 'persona'" class="flex flex-col h-full">
    <div class="px-4 py-3 border-b border-white/10">
        <p class="text-white font-semibold text-sm">角色与模型配置</p>
        <p class="text-white/40 text-xs mt-0.5">3D 模型更换、动画反馈与档案说明</p>
    </div>
    <div class="flex-1 overflow-y-auto custom-scrollbar px-4 py-3 gap-3">

        <!-- Text Personas -->
        <div class="mb-6">
            <p class="text-blue-300 text-xs font-semibold mb-2">当前角色卡信息</p>
            <template x-for="[name, content] in Object.entries(personas)" :key="name">
                <div class="mb-2">
                    <p class="text-white/60 text-[10px] mb-1 uppercase tracking-wider" x-text="name"></p>
                    <pre class="text-white/50 text-[10px] leading-relaxed whitespace-pre-wrap bg-white/5 rounded-lg p-2 max-h-32 overflow-y-auto custom-scrollbar"
                        x-text="content"></pre>
                </div>
            </template>
            <div x-show="Object.keys(personas).length === 0" class="py-2 text-center text-white/30 text-xs">
                加载中...</div>
        </div>

        <!-- Save Viewport -->
        <div class="mb-6">
            <p class="text-blue-300 text-xs font-semibold mb-2">视角快照</p>
            <div class="bg-white/5 border border-white/10 rounded-xl p-3 flex items-center justify-between gap-3">
                <div>
                    <p class="text-white/80 text-xs font-medium">保存当前视角</p>
                    <p class="text-white/35 text-[10px] mt-0.5">记录模型、位置与镜头，刷新后自动恢复</p>
                </div>
                <button @click="saveVrmConfig()" :disabled="saveVrmStatus === 'saving'"
                    class="shrink-0 flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
                    :class="{
                        'bg-blue-500/20 text-blue-300 hover:bg-blue-500/40': saveVrmStatus === '',
                        'bg-white/10 text-white/40 cursor-not-allowed': saveVrmStatus === 'saving',
                        'bg-green-500/20 text-green-300': saveVrmStatus === 'ok',
                        'bg-red-500/20 text-red-300': saveVrmStatus === 'error'
                    }">
                    <span x-show="saveVrmStatus === ''" class="flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" />
                        </svg>
                        保存
                    </span>
                    <span x-show="saveVrmStatus === 'saving'">保存中...</span>
                    <span x-show="saveVrmStatus === 'ok'">✓ 已保存</span>
                    <span x-show="saveVrmStatus === 'error'">✗ 失败</span>
                </button>
            </div>
        </div>

        <!-- Model Upload -->
        <div class="mb-6">
            <p class="text-blue-300 text-xs font-semibold mb-2">上传新 VRM 模型</p>
            <div
                class="relative w-full border-2 border-dashed border-white/20 rounded-xl p-4 text-center hover:border-blue-400/50 transition-colors bg-white/5">
                <input type="file" accept=".vrm" @change="uploadModel($event)" :disabled="uploadingModel"
                    class="absolute inset-0 w-full h-full opacity-0 cursor-pointer disabled:cursor-not-allowed">
                <svg class="mx-auto h-6 w-6 text-white/40 mb-2" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <span class="text-xs text-white/60"
                    x-text="uploadingModel ? '上传中...' : '点击或拖拽 .vrm 文件'"></span>
            </div>
            <p x-show="uploadStatus" class="text-[10px] mt-1 text-center"
                :class="uploadStatus.startsWith('✓') ? 'text-green-400' : 'text-red-400'"
                x-text="uploadStatus"></p>
        </div>

        <!-- Model List -->
        <div class="mb-6">
            <p class="text-blue-300 text-xs font-semibold mb-2 flex justify-between items-center">
                可用模型库
                <button @click="loadModels()" class="text-white/40 hover:text-white/80">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
            </p>
            <div class="flex flex-col gap-2">
                <template x-for="model in vrmModels" :key="model.name">
                    <div class="w-full flex items-center gap-1.5 group">
                        <button @click="switchVrmModel(model.path)"
                            class="flex-1 text-left p-2.5 rounded-lg bg-white/5 hover:bg-white/10 transition-colors border border-white/10 flex items-center justify-between overflow-hidden">
                            <span class="text-white/80 text-xs truncate pr-2" x-text="model.name"></span>
                            <span
                                class="text-blue-400/0 group-hover:text-blue-400 text-[10px] transition-colors whitespace-nowrap">应用</span>
                        </button>
                        <button @click.stop="deleteModel(model.name)"
                            class="p-2.5 rounded-lg bg-red-500/10 hover:bg-red-500/20 text-red-400/40 hover:text-red-400 border border-red-500/10 transition-all opacity-0 group-hover:opacity-100"
                            title="删除模型">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                            </svg>
                        </button>
                    </div>
                </template>
                <div x-show="vrmModels.length === 0" class="text-center text-white/30 text-xs py-4">无可用模型</div>
            </div>
        </div>

        <!-- Expression & Action Controls -->
        <div class="mb-6">
            <p class="text-blue-300 text-xs font-semibold mb-2">表情与动画操控</p>
            <div class="space-y-3">
                <div>
                    <p class="text-white/60 text-[10px] mb-1.5 uppercase tracking-wider">手动表情</p>
                    <div class="grid grid-cols-4 gap-2">
                        <button @click="triggerExpression('happy')"
                            class="py-1.5 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-xs text-white/80 transition-colors">开心</button>
                        <button @click="triggerExpression('angry')"
                            class="py-1.5 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-xs text-white/80 transition-colors">生气</button>
                        <button @click="triggerExpression('sad')"
                            class="py-1.5 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-xs text-white/80 transition-colors">难过</button>
                        <button @click="triggerExpression('relaxed')"
                            class="py-1.5 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-xs text-white/80 transition-colors">放松</button>
                        <button @click="triggerExpression('surprised')"
                            class="py-1.5 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-xs text-white/80 transition-colors">惊讶</button>
                        <button @click="triggerExpression('neutral')"
                            class="py-1.5 bg-white/5 hover:bg-white/20 rounded border border-blue-500/30 text-xs text-blue-200 transition-colors col-span-3">恢复自然表情</button>
                    </div>
                </div>
                <div>
                    <p class="text-white/60 text-[10px] mb-1.5 uppercase tracking-wider">快捷动作</p>
                    <div class="grid grid-cols-3 gap-2 custom-scrollbar pr-1"
                        style="max-height: 200px; overflow-y: auto;">
                        <template x-for="anim in vrmAnimations" :key="anim.path">
                            <button @click="triggerAction(anim.path)"
                                class="py-1.5 px-1 bg-white/5 hover:bg-white/10 rounded border border-white/10 text-[11px] text-white/80 transition-colors truncate"
                                x-text="anim.name" :title="anim.name"></button>
                        </template>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
