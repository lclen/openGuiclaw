<!-- Token Stats (Audit) Panel -->
<div x-show="activePanel === 'tokens'" class="flex flex-col h-full bg-transparent overflow-hidden"
    x-init="loadTokenStats(tokenPeriod)">

    <style>
        .token-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
            background: var(--noble-black-800);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .token-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, transparent 100%);
            pointer-events: none;
        }

        .token-card:hover {
            border-color: rgba(182, 240, 89, 0.4);
            background: rgba(182, 240, 89, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -8px rgba(182, 240, 89, 0.3);
        }

        .primary-glow-green {
            box-shadow: 0 0 15px rgba(182, 240, 89, 0.4);
            animation: pulse-glow-green 2s infinite;
        }

        @keyframes pulse-glow-green {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.2);
                opacity: 0.7;
            }
        }

        .chart-bar-viz {
            transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
    </style>

    <!-- Header -->
    <div class="px-6 py-5 border-b border-white/5 bg-[var(--noble-black-950)]/30 shrink-0">
        <div class="flex items-center justify-between">
            <div class="flex items-center gap-4">
                <div
                    class="w-11 h-11 rounded-[14px] bg-[var(--stem-green-500)]/10 border border-[var(--stem-green-500)]/20 flex items-center justify-center shadow-[inset_0_0_15px_rgba(182,240,89,0.1)]">
                    <svg class="w-5 h-5 text-[var(--stem-green-500)]" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                    </svg>
                </div>
                <div>
                    <h2 class="text-[14px] font-bold text-white tracking-wide uppercase flex items-center gap-2.5">
                        算力消耗审计
                        <span
                            class="px-2 py-0.5 rounded-md bg-[var(--stem-green-500)]/20 text-[var(--stem-green-500)] text-[9px] uppercase tracking-widest border border-[var(--stem-green-500)]/30 font-black animate-pulse">Live
                            Tracker</span>
                    </h2>
                    <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight mt-0.5">实时追踪神经突触流转
                        (Neural Usage Analytics)</p>
                </div>
            </div>
            <div class="flex items-center gap-2.5">
                <button @click="loadTokenStats(tokenPeriod)"
                    class="w-9 h-9 flex items-center justify-center rounded-xl bg-[var(--noble-black-800)] hover:bg-[var(--stem-green-500)]/20 text-[var(--noble-black-400)] hover:text-[var(--stem-green-500)] border border-white/5 hover:border-[var(--stem-green-500)]/30 transition-all active:scale-95 group">
                    <svg class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                    </svg>
                </button>
                <div class="h-4 w-px bg-white/10 mx-0.5"></div>
                <button @click="resetTokenStats()"
                    class="w-9 h-9 flex items-center justify-center rounded-xl bg-rose-500/10 hover:bg-rose-500 text-rose-500 hover:text-[var(--noble-black-950)] border border-rose-500/20 hover:border-rose-500 transition-all active:scale-95"
                    title="清除拓扑记录">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Stats Content -->
    <div
        class="flex-1 overflow-y-auto custom-scrollbar p-6 space-y-8 bg-gradient-to-b from-transparent to-[var(--noble-black-950)]/50">

        <!-- Time Filter -->
        <div class="flex p-1.5 bg-[var(--noble-black-950)]/80 border border-white/5 rounded-2xl w-fit shadow-inner">
            <template
                x-for="p in [{k:'1d',n:'一天'},{k:'3d',n:'三天'},{k:'1w',n:'一周'},{k:'1m',n:'一月'},{k:'6m',n:'半年'},{k:'1y',n:'一年'},{k:'all',n:'全部'}]"
                :key="p.k">
                <button @click="tokenPeriod = p.k; loadTokenStats(p.k)"
                    :class="tokenPeriod === p.k ? 'bg-[var(--stem-green-500)] text-[var(--noble-black-900)] shadow-[0_0_12px_rgba(182,240,89,0.3)] font-black' : 'text-[var(--noble-black-400)] hover:text-white font-bold'"
                    class="px-5 py-1.5 rounded-xl text-[11px] uppercase tracking-widest transition-all duration-300"
                    x-text="p.n"></button>
            </template>
        </div>

        <!-- Metric Cards -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Total Tokens -->
            <div class="token-card rounded-2xl p-5 group flex flex-col justify-between">
                <div class="flex items-center gap-2.5 mb-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-[var(--stem-green-500)] primary-glow-green"></div>
                    <span
                        class="text-[10px] items-center font-bold text-[var(--noble-black-300)] uppercase tracking-widest">能量吞吐极值</span>
                </div>
                <div class="flex items-end gap-2 mt-2">
                    <span class="text-[32px] font-black text-white font-mono leading-none tracking-tight"
                        x-text="formatNum(tokenStats.total_tokens)"></span>
                    <span
                        class="text-[11px] font-bold text-[var(--stem-green-500)] uppercase tracking-widest mb-1.5">Tokens</span>
                </div>
            </div>
            <!-- API Calls -->
            <div class="token-card rounded-2xl p-5 group flex flex-col justify-between">
                <div class="flex items-center gap-2.5 mb-2">
                    <div class="w-1.5 h-1.5 rounded-full bg-cyan-400 shadow-[0_0_10px_rgba(34,211,238,0.5)]"></div>
                    <span
                        class="text-[10px] font-bold text-[var(--noble-black-300)] uppercase tracking-widest">神经请求频次</span>
                </div>
                <div class="flex items-end gap-2 mt-2">
                    <span class="text-[32px] font-black text-white font-mono leading-none tracking-tight"
                        x-text="formatNum(tokenStats.request_count)"></span>
                    <span class="text-[11px] font-bold text-cyan-400 uppercase tracking-widest mb-1.5">Calls</span>
                </div>
            </div>
            <!-- Prompt (Ingest) -->
            <div class="token-card rounded-2xl p-5 border-l-2 border-l-indigo-500">
                <span
                    class="block text-[10px] font-bold text-[var(--noble-black-400)] uppercase tracking-widest mb-2.5">接收流
                    (Ingest)</span>
                <div class="text-[24px] font-black text-indigo-400 font-mono tracking-tight"
                    x-text="formatNum(tokenStats.total_prompt_tokens)"></div>
            </div>
            <!-- Completion (Emit) -->
            <div class="token-card rounded-2xl p-5 border-l-2 border-l-[var(--stem-green-500)]">
                <span
                    class="block text-[10px] font-bold text-[var(--noble-black-400)] uppercase tracking-widest mb-2.5">输出流
                    (Emit)</span>
                <div class="text-[24px] font-black text-[var(--stem-green-500)] font-mono tracking-tight"
                    x-text="formatNum(tokenStats.total_completion_tokens)"></div>
            </div>
        </div>

        <!-- Progress Bar (Ratio) -->
        <div x-show="tokenStats.total_tokens > 0"
            class="space-y-4 p-5 rounded-2xl bg-[var(--noble-black-800)]/40 border border-white/5">
            <div class="flex items-center justify-between px-1">
                <span class="text-[10px] font-bold text-[var(--noble-black-300)] uppercase tracking-widest">模型能耗配比 (I/O
                    Ratio)</span>
                <div class="flex items-center gap-4 text-[10px] font-bold uppercase tracking-wider font-mono">
                    <div class="flex items-center gap-2">
                        <span class="text-[var(--noble-black-400)]">In:</span>
                        <span class="text-indigo-400"
                            x-text="Math.round(tokenStats.total_prompt_tokens / tokenStats.total_tokens * 100) + '%'"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-[var(--noble-black-400)]">Out:</span>
                        <span class="text-[var(--stem-green-500)]"
                            x-text="Math.round(tokenStats.total_completion_tokens / tokenStats.total_tokens * 100) + '%'"></span>
                    </div>
                </div>
            </div>
            <div
                class="h-2.5 bg-[var(--noble-black-950)] rounded-full overflow-hidden flex border border-white/5 shadow-inner">
                <div class="h-full bg-gradient-to-r from-indigo-500 to-indigo-400 transition-all duration-1000"
                    :style="'width:' + (tokenStats.total_prompt_tokens / tokenStats.total_tokens * 100) + '%'"></div>
                <div class="h-full bg-gradient-to-r from-green-500 to-[var(--stem-green-500)] transition-all duration-1000"
                    :style="'width:' + (tokenStats.total_completion_tokens / tokenStats.total_tokens * 100) + '%'">
                </div>
            </div>
        </div>

        <!-- Chart Timeline -->
        <div x-show="tokenStats.timeline && tokenStats.timeline.length > 0" class="space-y-4">
            <div class="flex items-center justify-between px-1">
                <h3 class="text-[11px] font-bold text-[var(--noble-black-400)] uppercase tracking-widest">能耗波动图谱
                    (Timeline)</h3>
                <div class="flex items-center gap-4 text-[9px] font-bold uppercase tracking-widest">
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-sm bg-indigo-500"></span>
                        <span class="text-[var(--noble-black-400)]">Input</span>
                    </div>
                    <div class="flex items-center gap-1.5">
                        <span class="w-2.5 h-2.5 rounded-sm bg-amber-400"></span>
                        <span class="text-[var(--noble-black-400)]">Output</span>
                    </div>
                </div>
            </div>
            <div class="relative px-3 pt-4 pb-6 bg-[var(--noble-black-900)]/50 border border-white/5 rounded-2xl">
                <!-- Y-axis grid lines -->
                <div class="absolute inset-x-3 top-4 bottom-6 flex flex-col justify-between pointer-events-none">
                    <template x-for="i in [100, 75, 50, 25, 0]" :key="i">
                        <div class="flex items-center gap-2">
                            <span class="text-[8px] text-[var(--noble-black-600)] font-mono w-6 text-right shrink-0"
                                x-text="i + '%'"></span>
                            <div class="flex-1 border-t border-white/5"></div>
                        </div>
                    </template>
                </div>
                <!-- Bars -->
                <div class="ml-8 h-36 flex items-end gap-1">
                    <template x-for="t in tokenStats.timeline" :key="t.time">
                        <div class="flex-1 flex flex-col justify-end gap-0 relative group/bar cursor-crosshair min-w-0"
                            style="height: 100%">
                            <!-- Tooltip -->
                            <div
                                class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 px-3 py-2 bg-[var(--noble-black-800)] border border-white/10 rounded-xl pointer-events-none opacity-0 group-hover/bar:opacity-100 transition-all z-20 whitespace-nowrap shadow-2xl text-left">
                                <div class="text-[var(--noble-black-400)] text-[9px] font-bold uppercase tracking-widest border-b border-white/10 pb-1.5 mb-1.5"
                                    x-text="t.time"></div>
                                <div class="flex items-center gap-1.5 mb-1">
                                    <span class="w-1.5 h-1.5 rounded-sm bg-indigo-500 shrink-0"></span>
                                    <span class="text-[10px] text-indigo-300 font-mono font-bold"
                                        x-text="formatNum(t.prompt || 0)"></span>
                                </div>
                                <div class="flex items-center gap-1.5 mb-1.5">
                                    <span class="w-1.5 h-1.5 rounded-sm bg-amber-400 shrink-0"></span>
                                    <span class="text-[10px] text-amber-300 font-mono font-bold"
                                        x-text="formatNum(t.completion || 0)"></span>
                                </div>
                                <div class="text-[10px] text-white font-black font-mono border-t border-white/10 pt-1.5"
                                    x-text="'∑ ' + formatNum(t.total)"></div>
                            </div>
                            <!-- Output bar (amber, top) -->
                            <div class="w-full rounded-t-[3px] bg-amber-400 hover:bg-amber-300 transition-all duration-500 chart-bar-viz shrink-0"
                                :style="'height:' + (Math.max(0, ((t.completion || 0) / Math.max(...tokenStats.timeline.map(x=>x.total), 1)) * 100)) + '%'">
                            </div>
                            <!-- Input bar (indigo, bottom) -->
                            <div class="w-full bg-indigo-500 hover:bg-indigo-400 transition-all duration-500 chart-bar-viz shrink-0"
                                :style="'height:' + (Math.max(0, ((t.prompt || 0) / Math.max(...tokenStats.timeline.map(x=>x.total), 1)) * 100)) + '%'">
                            </div>
                        </div>
                    </template>
                </div>
                <!-- X-axis labels -->
                <div class="ml-8 mt-1.5 flex gap-1">
                    <template x-for="t in tokenStats.timeline" :key="'lbl-' + t.time">
                        <div class="flex-1 text-center text-[8px] text-[var(--noble-black-600)] font-mono truncate"
                            x-text="t.time"></div>
                    </template>
                </div>
            </div>
        </div>

        <!-- Breakdown by Model -->
        <div class="space-y-4">
            <h3 class="text-[11px] font-bold text-[var(--noble-black-400)] uppercase tracking-widest px-1">协议模型载入清单
                (Models)</h3>
            <div class="grid gap-3">
                <template x-for="[model, stat] in Object.entries(tokenStats.by_model || {})" :key="model">
                    <div class="token-card rounded-2xl px-5 py-4 group">
                        <div class="flex items-center justify-between mb-4">
                            <div class="flex items-center gap-3 pr-4">
                                <span class="text-[13px] font-bold text-white tracking-tight truncate font-mono"
                                    x-text="model"></span>
                            </div>
                            <span
                                class="text-[9px] font-black text-[var(--noble-black-300)] bg-white/5 px-2.5 py-1 rounded-[6px] border border-white/5 uppercase tracking-widest"
                                x-text="stat.count + ' CTX'"></span>
                        </div>
                        <div class="flex items-center justify-between">
                            <div class="flex gap-8">
                                <div class="flex flex-col">
                                    <span
                                        class="text-[9px] font-bold text-[var(--noble-black-500)] uppercase tracking-widest mb-1">In</span>
                                    <span class="text-[12px] font-black text-indigo-400 font-mono tracking-wide"
                                        x-text="formatNum(stat.prompt)"></span>
                                </div>
                                <div class="flex flex-col">
                                    <span
                                        class="text-[9px] font-bold text-[var(--noble-black-500)] uppercase tracking-widest mb-1">Out</span>
                                    <span
                                        class="text-[12px] font-black text-[var(--stem-green-500)] font-mono tracking-wide"
                                        x-text="formatNum(stat.completion)"></span>
                                </div>
                            </div>
                            <div class="text-right">
                                <span
                                    class="text-[9px] font-bold text-[var(--noble-black-500)] uppercase block mb-1 tracking-widest">Total</span>
                                <span class="text-[14px] font-black text-white font-mono tracking-tight"
                                    x-text="formatNum(stat.total)"></span>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Empty State -->
        <div x-show="tokenStats.request_count === 0"
            class="flex flex-col items-center justify-center py-20 text-[var(--noble-black-400)]">
            <div
                class="w-16 h-16 mb-6 rounded-2xl bg-white/5 flex items-center justify-center border border-white/5 shadow-inner">
                <svg class="w-8 h-8 opacity-40" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
            <p class="text-[12px] font-black uppercase tracking-widest text-white/50">暂无审计轨迹</p>
            <p class="text-[10px] font-medium mt-2 tracking-wide text-white/30">Neutral network records are empty</p>
        </div>
    </div>
</div>
