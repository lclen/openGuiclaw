<!-- Diary Panel -->
<div x-show="activePanel === 'diary'" class="flex flex-col h-full">
    <div class="px-4 py-3 border-b border-white/10">
        <p class="text-white font-semibold text-sm">AI 日记</p>
        <p class="text-white/40 text-xs mt-0.5">每日感悟</p>
    </div>
    <div x-show="!selectedDiaryContent" class="flex-1 overflow-y-auto custom-scrollbar py-2">
        <template x-for="date in diaryDates" :key="date">
            <button @click="loadDiary(date)"
                class="w-full text-left px-4 py-2.5 hover:bg-white/10 transition-colors border-b border-white/5 flex items-center gap-3">
                <div class="w-8 h-8 rounded-lg bg-blue-400/20 flex items-center justify-center text-blue-300 text-xs font-bold"
                    x-text="date.slice(-2)"></div>
                <div>
                    <p class="text-white/85 text-xs" x-text="date"></p>
                    <p class="text-white/35 text-xs">点击查看</p>
                </div>
            </button>
        </template>
        <div x-show="diaryDates.length === 0" class="px-4 py-8 text-center text-white/30 text-sm">暂无日记</div>
    </div>
    <!-- Diary Content View -->
    <div x-show="selectedDiaryContent" class="flex flex-col h-full">
        <button @click="selectedDiaryContent = null"
            class="mx-4 mt-3 mb-2 flex items-center gap-1 text-white/50 hover:text-white/80 text-xs transition-colors">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            返回列表
        </button>
        <div class="flex-1 overflow-y-auto custom-scrollbar px-4 pb-4">
            <div class="text-white/80 text-xs leading-relaxed md-body"
                x-html="typeof marked !== 'undefined' ? marked.parse(selectedDiaryContent || '') : selectedDiaryContent"></div>
        </div>
    </div>
</div>
