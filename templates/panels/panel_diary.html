<!-- Diary Panel -->
<div x-show="activePanel === 'diary'" class="flex flex-col h-full bg-[var(--noble-black-900)]">
    <div class="px-6 py-3.5 border-b border-white/5 shrink-0 flex justify-between items-center">
        <div>
            <h2 class="text-[14px] font-bold text-white tracking-wide uppercase">认知日志回溯</h2>
            <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight mt-0.5">每日思维逻辑与经验重构记录</p>
        </div>
        <button @click="loadDiaryDates()"
            class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-400)] hover:text-white hover:bg-white/5 rounded-lg transition-all">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </div>

    <!-- List -->
    <div x-show="!selectedDiaryContent" class="flex-1 overflow-y-auto custom-scrollbar p-5 space-y-2.5">
        <template x-for="date in diaryDates" :key="date">
            <button @click="loadDiary(date)"
                class="w-full text-left p-3 bg-[var(--noble-black-800)] hover:bg-[var(--noble-black-700)] border border-white/5 rounded-xl transition-all flex items-center gap-3.5 group">
                <div class="w-9 h-9 rounded-lg bg-[var(--noble-black-900)] border border-white/5 flex items-center justify-center text-[var(--stem-green-500)] text-[12px] font-black shrink-0 group-hover:bg-[var(--noble-black-800)] transition-colors"
                    x-text="date.slice(-2)"></div>
                <div>
                    <p class="text-[var(--noble-black-100)] text-[12px] font-bold tracking-tight" x-text="date"></p>
                    <p class="text-[var(--noble-black-500)] text-[10px] uppercase font-bold tracking-wider mt-0.5">
                        读取思维副本</p>
                </div>
                <div class="ml-auto opacity-0 group-hover:opacity-100 transition-opacity">
                    <svg class="w-3.5 h-3.5 text-[var(--stem-green-500)]" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7" />
                    </svg>
                </div>
            </button>
        </template>
        <div x-show="diaryDates.length === 0"
            class="flex flex-col items-center justify-center py-20 text-[var(--noble-black-500)]">
            <div
                class="w-12 h-12 rounded-xl bg-[var(--noble-black-900)]/60 flex items-center justify-center mb-4 border border-white/5 shadow-inner">
                <svg class="w-6 h-6 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168.477 4.253 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                </svg>
            </div>
            <p class="text-[11px] font-bold opacity-30">暂无日志交互记录</p>
        </div>
    </div>

    <!-- Content View -->
    <div x-show="selectedDiaryContent" class="flex-1 flex flex-col min-h-0 bg-[var(--noble-black-900)]/40"
        x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-4"
        x-transition:enter-end="opacity-100 translate-x-0">
        <div
            class="px-5 py-3 flex items-center gap-3.5 bg-[var(--noble-black-800)]/60 border-b border-white/5 shadow-md">
            <button @click="selectedDiaryContent = null"
                class="w-7 h-7 flex items-center justify-center text-[var(--noble-black-400)] hover:text-white hover:bg-white/5 rounded-md transition-all">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
                </svg>
            </button>
            <div class="flex-1 min-w-0">
                <p class="text-[var(--noble-black-100)] text-[13px] font-bold truncate">日志反思详情</p>
                <p class="text-[var(--noble-black-500)] text-[10.5px] uppercase font-bold tracking-[0.1em]">记忆区数据重解</p>
            </div>
        </div>

        <div class="flex-1 overflow-y-auto custom-scrollbar p-6">
            <div class="md-body prose prose-invert max-w-none text-[var(--noble-black-200)] text-[13px] leading-relaxed selection:bg-[var(--stem-green-500)]/30"
                x-html="typeof marked !== 'undefined' ? marked.parse(selectedDiaryContent || '') : selectedDiaryContent">
            </div>
        </div>
    </div>
</div>
