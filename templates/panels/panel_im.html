<!-- IM Message Panel -->
<div x-show="activePanel === 'im'" class="flex flex-col h-full" x-init="fetchIMData()">
    <!-- 1. Channels Status -->
    <div class="px-4 py-3 border-b border-white/10 bg-white/2">
        <p class="text-white font-semibold text-sm flex items-center gap-2">
            <svg class="w-4 h-4 text-sky-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z">
                </path>
            </svg>
            IM 通道状态
        </p>
        <div class="flex flex-wrap gap-2 mt-2">
            <template x-for="c in imChannels" :key="c.id">
                <div class="flex items-center gap-1.5 px-2 py-1 bg-white/5 rounded-full border border-white/10">
                    <div class="w-1.5 h-1.5 rounded-full"
                        :class="c.status === 'online' ? 'bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.6)]'">
                    </div>
                    <span class="text-[10px] text-white/70" x-text="c.name"></span>
                </div>
            </template>
            <div x-show="imChannels.length === 0" class="text-white/30 text-[10px]">未配置任何 IM 通道</div>
        </div>
    </div>

    <!-- 2. IM Sessions List -->
    <div class="px-4 py-3 border-b border-white/10 flex justify-between items-center">
        <p class="text-white font-semibold text-sm">IM 对话列表</p>
        <button @click="fetchIMData()" class="p-1 hover:bg-white/10 rounded transition-colors group" title="刷新">
            <svg class="w-3.5 h-3.5 text-white/50 group-hover:text-white/80" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15">
                </path>
            </svg>
        </button>
    </div>

    <div class="flex-1 overflow-y-auto custom-scrollbar py-2">
        <template x-for="s in imSessions" :key="s.id">
            <button @click="loadSession(s.id, true)" :disabled="isReceiving"
                class="w-full text-left px-4 py-3 hover:bg-white/10 transition-colors border-b border-white/5 disabled:opacity-40 disabled:cursor-not-allowed relative group"
                :class="{'bg-[var(--stem-green-500)]/5': s.id === currentSessionId}">

                <!-- Active Indicator Border -->
                <div x-show="s.id === currentSessionId"
                    class="absolute left-0 top-0 bottom-0 w-0.5 bg-[var(--stem-green-500)] shadow-[0_0_10px_var(--stem-green-500)]">
                </div>

                <div class="flex items-center gap-2 mb-1.5">
                    <span class="text-[9px] uppercase px-1.5 py-0.5 rounded-sm border font-bold" :class="{
                             'bg-blue-500/20 text-blue-400 border-blue-500/30': s.channel === 'dingtalk',
                             'bg-emerald-500/20 text-emerald-400 border-emerald-500/30': s.channel === 'feishu',
                             'bg-sky-500/20 text-sky-400 border-sky-500/30': s.channel === 'telegram'
                          }" x-text="s.channel"></span>
                    <span class="text-white/40 text-[9px] truncate" x-text="s.chat_id"></span>
                </div>

                <div class="flex justify-between items-baseline">
                    <p class="text-white/85 text-xs truncate flex-1 leading-tight"
                        :class="{'text-[var(--stem-green-400)] font-medium': s.id === currentSessionId}"
                        x-text="s.last_message || '(媒体消息或空对话)'"></p>
                    <span x-show="s.id === currentSessionId"
                        class="text-[9px] bg-green-500/20 text-green-400 px-1 py-0.5 rounded-xs ml-2 shrink-0 border border-green-500/30">当前</span>
                </div>

                <div class="flex justify-between items-center mt-2 opacity-60">
                    <p class="text-white/50 text-[10px] flex items-center gap-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z">
                            </path>
                        </svg>
                        <span x-text="`${s.message_count}`"></span>
                    </p>
                    <p class="text-white/40 text-[9px] flex items-center gap-1">
                        <svg class="w-3 h-3 text-white/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                        </svg>
                        <span x-text="s.updated_at ? s.updated_at.slice(5, 16) : ''"></span>
                    </p>
                </div>
            </button>
        </template>
        <div x-show="imSessions.length === 0" class="px-4 py-12 text-center">
            <svg class="w-8 h-8 text-white/10 mx-auto mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                    d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z">
                </path>
            </svg>
            <p class="text-white/30 text-xs">暂无活跃的 IM 对话</p>
        </div>
    </div>
</div>
