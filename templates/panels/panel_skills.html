<!-- Skills Management Panel -->
<div x-show="activePanel === 'skills'" class="h-full flex flex-col">
    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-4 border-b border-white/10">
        <div>
            <h2 class="text-xl font-semibold text-white">技能管理</h2>
            <p class="text-sm text-white/60 mt-1">管理 AI 助手的可用技能</p>
        </div>
        <button @click="reloadSkills()"
            class="px-4 py-2 bg-blue-500/20 hover:bg-blue-500/30 text-blue-300 rounded-lg transition-colors text-sm">
            刷新
        </button>
    </div>

    <!-- Search and Filter -->
    <div class="px-6 py-4 border-b border-white/10">
        <div class="flex gap-3">
            <input type="text" x-model="skillSearchQuery" placeholder="搜索已安装技能..."
                class="flex-1 px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white placeholder-white/40 focus:outline-none focus:border-blue-500/50">
            <select x-model="skillCategoryFilter"
                class="px-4 py-2 bg-white/5 border border-white/10 rounded-lg text-white focus:outline-none focus:border-blue-500/50">
                <option value="all">全部分类</option>
                <option value="general">通用</option>
                <option value="filesystem">文件系统</option>
                <option value="autogui">自动化</option>
                <option value="web">网络</option>
                <option value="system">系统</option>
                <option value="interaction">交互</option>
                <option value="utility">工具</option>
            </select>
        </div>
        <div class="flex gap-2 mt-3">
            <button @click="skillStatusFilter = 'all'"
                :class="skillStatusFilter === 'all' ? 'bg-blue-500/30 text-blue-300' : 'bg-white/5 text-white/60'"
                class="px-3 py-1 rounded-lg text-sm transition-colors">
                全部 (<span x-text="skills.length"></span>)
            </button>
            <button @click="skillStatusFilter = 'enabled'"
                :class="skillStatusFilter === 'enabled' ? 'bg-green-500/30 text-green-300' : 'bg-white/5 text-white/60'"
                class="px-3 py-1 rounded-lg text-sm transition-colors">
                已启用 (<span x-text="skills.filter(s => s.enabled).length"></span>)
            </button>
            <button @click="skillStatusFilter = 'disabled'"
                :class="skillStatusFilter === 'disabled' ? 'bg-gray-500/30 text-gray-300' : 'bg-white/5 text-white/60'"
                class="px-3 py-1 rounded-lg text-sm transition-colors">
                已禁用 (<span x-text="skills.filter(s => !s.enabled).length"></span>)
            </button>
        </div>
    </div>

    <!-- Skills List -->
    <div class="flex-1 overflow-y-auto px-6 py-4">
        <div class="space-y-3">
            <template x-for="skill in filteredSkills" :key="skill.name">
                <div class="bg-white/5 border border-white/10 rounded-xl p-4 hover:bg-white/8 transition-colors">
                    <div class="flex items-start justify-between">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-2">
                                <!-- Skill Icon -->
                                <div
                                    class="w-10 h-10 bg-gradient-to-br from-blue-500/20 to-purple-500/20 rounded-lg flex items-center justify-center flex-shrink-0">
                                    <svg class="w-5 h-5 text-blue-300" fill="none" stroke="currentColor"
                                        viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M13 10V3L4 14h7v7l9-11h-7z" />
                                    </svg>
                                </div>

                                <!-- Skill Name and Status -->
                                <div class="flex-1 min-w-0">
                                    <div class="flex items-center gap-2">
                                        <h3 class="text-white font-medium truncate" x-text="skill.name"></h3>
                                        <span x-show="skill.enabled"
                                            class="px-2 py-0.5 bg-green-500/20 text-green-300 text-xs rounded-full flex-shrink-0">
                                            已启用
                                        </span>
                                        <span x-show="!skill.enabled"
                                            class="px-2 py-0.5 bg-gray-500/20 text-gray-400 text-xs rounded-full flex-shrink-0">
                                            已禁用
                                        </span>
                                    </div>
                                    <div class="flex items-center gap-2 mt-1">
                                        <span class="text-xs text-white/40" x-text="skill.category"></span>
                                    </div>
                                </div>
                            </div>

                            <!-- Description -->
                            <p class="text-sm text-white/60 mb-3 line-clamp-2" x-text="skill.description"></p>

                            <!-- Requirements & Config Area -->
                            <div class="mt-3">
                                <!-- Parameters Info -->
                                <div x-show="skill.parameters && skill.parameters.properties && Object.keys(skill.parameters.properties).length > 0"
                                    class="text-xs text-white/40 mb-2">
                                    参数: <span x-text="Object.keys(skill.parameters.properties || {}).join(', ')"></span>
                                </div>

                                <!-- Config Toggle -->
                                <div x-show="skill.ui_config && skill.ui_config.length > 0" class="mt-2 text-sm">
                                    <button @click="skill._showConfig = !skill._showConfig"
                                        class="text-blue-400 hover:text-blue-300 transition-colors flex items-center gap-1 text-xs">
                                        <svg class="w-3 h-3 transition-transform"
                                            :class="{'rotate-90': skill._showConfig}" fill="none" stroke="currentColor"
                                            viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M9 5l7 7-7 7"></path>
                                        </svg>
                                        <span x-text="skill._showConfig ? '收起配置' : '展开配置'"></span>
                                    </button>

                                    <!-- Dynamic Config Form -->
                                    <div x-show="skill._showConfig" x-transition.opacity.duration.200ms
                                        class="mt-3 p-3 bg-black/20 rounded-lg border border-white/5 space-y-3 relative">
                                        <template x-for="field in skill.ui_config" :key="field.key">
                                            <div>
                                                <label class="block text-xs font-medium text-white/70 mb-1">
                                                    <span x-text="field.label"></span>
                                                    <span x-show="field.required" class="text-red-400">*</span>
                                                </label>

                                                <template x-if="field.type === 'text'">
                                                    <input type="text" x-model="skill.config_values[field.key]"
                                                        :placeholder="field.default !== undefined ? field.default : ''"
                                                        class="w-full px-3 py-1.5 bg-white/5 border border-white/10 rounded focus:border-blue-500/50 focus:outline-none text-white text-xs">
                                                </template>

                                                <template x-if="field.type === 'secret'">
                                                    <input type="password" x-model="skill.config_values[field.key]"
                                                        :placeholder="field.default !== undefined ? field.default : ''"
                                                        class="w-full px-3 py-1.5 bg-white/5 border border-white/10 rounded focus:border-blue-500/50 focus:outline-none text-white text-xs">
                                                </template>

                                                <template x-if="field.type === 'select'">
                                                    <select x-model="skill.config_values[field.key]"
                                                        class="w-full px-3 py-1.5 bg-white/5 border border-white/10 rounded focus:border-blue-500/50 focus:outline-none text-white text-xs">
                                                        <template x-for="opt in field.options" :key="opt">
                                                            <option :value="opt" x-text="opt" class="bg-gray-800">
                                                            </option>
                                                        </template>
                                                    </select>
                                                </template>

                                                <template x-if="field.type === 'bool'">
                                                    <label class="flex items-center gap-2 cursor-pointer mt-1">
                                                        <input type="checkbox" x-model="skill.config_values[field.key]"
                                                            class="w-3.5 h-3.5 bg-white/5 border-white/10 rounded">
                                                        <span class="text-xs text-white/60" x-text="field.label"></span>
                                                    </label>
                                                </template>

                                                <p x-show="field.help" class="text-[10px] text-white/30 mt-1"
                                                    x-text="field.help"></p>
                                            </div>
                                        </template>

                                        <div class="pt-2 flex justify-end">
                                            <button @click="saveSkillConfig(skill)"
                                                class="px-3 py-1.5 bg-blue-500/20 hover:bg-blue-500/30 text-blue-300 rounded text-xs transition-colors focus:outline-none flex items-center gap-1 disabled:opacity-50">
                                                <span x-text="skill._saving ? '保存中...' : '保存配置'"></span>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer">
                                <input type="checkbox" :checked="skill.enabled"
                                    @change="toggleSkill(skill.name, $event.target.checked)" class="sr-only peer">
                                <div
                                    class="w-11 h-6 bg-gray-600/50 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-blue-500">
                                </div>
                            </label>
                        </div>
                    </div>
                </div>
            </template>

            <!-- Empty State -->
            <div x-show="filteredSkills.length === 0" class="text-center py-12">
                <svg class="w-16 h-16 mx-auto text-white/20 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p class="text-white/40">未找到匹配的技能</p>
            </div>
        </div>
    </div>
</div>
