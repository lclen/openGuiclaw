<!-- ═══════════════ LEFT SIDEBAR ═══════════════ -->
<div id="sidebar" class="w-14 shrink-0 flex flex-col items-center py-4 gap-1 z-30 select-none border-r border-white/5">

    <!-- Logo -->
    <div class="mb-4 text-white/60 text-xs font-bold tracking-widest rotate--90">AI</div>

    <!-- Nav buttons -->
    <button @click="switchPanel('chat')" :class="{'active': activePanel === 'chat'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="对话">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
        </svg>
    </button>
    <button @click="switchPanel('history')" :class="{'active': activePanel === 'history'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="历史对话">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
    </button>
    <button @click="switchPanel('diary')" :class="{'active': activePanel === 'diary'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="AI 日记">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
    </button>
    <button @click="switchPanel('persona')" :class="{'active': activePanel === 'persona'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="角色与模型配置">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
    </button>
    <button @click="switchPanel('skills')" :class="{'active': activePanel === 'skills'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="技能管理">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
    </button>
    <button @click="switchPanel('scheduler')" :class="{'active': activePanel === 'scheduler'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="计划任务">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
        </svg>
    </button>
    <button @click="switchPanel('config')" :class="{'active': activePanel === 'config'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="系统设置">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        </svg>
    </button>
    <button @click="switchPanel('debug')" :class="{'active': activePanel === 'debug'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center relative" title="调试日志">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18" />
        </svg>
        <span x-show="debugLogs.length > 0 && activePanel !== 'debug'"
            class="absolute top-1.5 right-1.5 w-2 h-2 bg-yellow-400 rounded-full"></span>
    </button>
    <button @click="switchPanel('store')" :class="{'active': activePanel === 'store'}"
        class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="模型商店">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
        </svg>
    </button>

    <!-- Divider -->
    <div class="flex-1"></div>

    <!-- New chat btn -->
    <button @click="newSession()" class="sidebar-btn w-10 h-10 rounded-xl flex items-center justify-center" title="新对话">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
        </svg>
    </button>

    <!-- Status indicator -->
    <div class="mt-2 flex flex-col items-center gap-1">
        <div class="status-dot" :class="agentOnline ? 'bg-green-400' : 'bg-red-400'"></div>
        <span class="text-white/40 text-[9px]" x-text="agentOnline ? '在线' : '离线'"></span>
    </div>
</div>
