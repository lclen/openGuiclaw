<!-- ═══════════════ MOBILE BACKDROP ═══════════════ -->
<div x-show="sidebarOpen" @click="sidebarOpen = false"
    class="md:hidden absolute inset-0 bg-black/60 backdrop-blur-sm z-40 transition-opacity"
    x-transition:enter="duration-300 ease-out" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100"
    x-transition:leave="duration-200 ease-in" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0">
</div>

<!-- ═══════════════ LEFT SIDEBAR ═══════════════ -->
<div id="sidebar" :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
    class="absolute md:relative inset-y-0 left-0 w-64 md:w-[236px] shrink-0 flex flex-col py-6 gap-3 z-50 md:z-30 select-none bg-[var(--noble-black-900)] md:border border-white/5 shadow-[4px_0_24px_rgba(0,0,0,0.5)] md:rounded-[20px] transition-transform duration-300 ease-in-out">

    <!-- Mobile Header inside Sidebar -->
    <div class="flex items-center justify-between px-6 mb-4 md:hidden">
        <span class="text-[var(--noble-black-100)] font-black text-[14px] tracking-widest uppercase">系统矩阵菜单</span>
        <button @click="sidebarOpen = false" class="text-[var(--noble-black-400)]">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
    </div>

    <!-- User Avatar -->
    <div
        class="mb-3 md:mb-1.5 px-6 md:px-0 flex justify-center relative group cursor-pointer transition-transform hover:scale-105 active:scale-95 duration-500">
        <div
            class="w-11 h-11 rounded-xl overflow-hidden border border-white/10 group-hover:border-[var(--stem-green-500)]/50 transition-all duration-300 shadow-xl">
            <img src="https://api.dicebear.com/7.x/notionists/svg?seed=Intellisys" alt="User Avatar"
                class="w-full h-full object-cover">
        </div>
        <div
            class="absolute bottom-1 md:-bottom-0.5 right-7 md:-right-0.5 w-3.5 h-3.5 rounded-full bg-[var(--stem-green-500)] border-[2px] border-[var(--noble-black-900)] shadow-[0_0_8px_rgba(34,211,238,0.4)]">
        </div>
    </div>

    <!-- Nav buttons -->
    <div class="flex flex-col gap-2 px-3 md:px-4">
        <template x-for="btn in [
            { panel: 'chat',      title: '互动聊天',         icon: 'M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z' },
            { panel: 'diary',     title: '认知日志',      icon: 'M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253' },
            { panel: 'persona',   title: '角色配置',     icon: 'M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z' },
            { panel: 'scheduler', title: '自动化流',     icon: 'M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2-2v12a2 2 0 002 2z' },
            { panel: 'memory',    title: '记忆库',    icon: 'M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z' },
            { panel: 'skills',    title: '技能管理',     icon: 'M13 10V3L4 14h7v7l9-11h-7z' },
            { panel: 'store',     title: '资源商店',     icon: 'M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z' },
            { panel: 'tokens',    title: '使用统计',   icon: 'M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2-2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z' },
            { panel: 'config',    title: '系统设置',    icon: 'M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924-1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z' },
            { panel: 'debug',     title: '系统调试',     icon: 'M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4M9 3v18m0 0h10a2 2 0 002-2V9M9 21H5a2 2 0 01-2-2V9m0 0h18' }
        ]" :key="btn.panel">
            <button @click="switchPanel(btn.panel); sidebarOpen = false" :title="btn.title"
                class="relative w-full md:w-full h-12 md:h-11 px-4 rounded-xl flex items-center md:justify-start gap-3.5 transition-all duration-300 group/btn border"
                :class="activePanel === btn.panel
                    ? 'bg-[var(--noble-black-700)] text-[var(--stem-green-500)] border-[var(--stem-green-500)]/30 shadow-lg'
                    : 'bg-transparent text-[var(--noble-black-400)] border-transparent hover:text-[var(--noble-black-100)] hover:bg-[var(--noble-black-800)]/60 hover:border-white/10'">
                <svg class="w-5 h-5 shrink-0 transition-transform duration-300 group-hover/btn:scale-110" fill="none"
                    stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" :d="btn.icon" />
                </svg>
                <span class="text-[13px] font-bold tracking-wide" x-text="btn.title"></span>

                <!-- debug badge -->
                <span x-show="btn.panel === 'debug' && debugLogs.length > 0 && activePanel !== 'debug'"
                    class="absolute top-1 right-2 md:right-1 w-2.5 h-2.5 bg-rose-500 rounded-full border-2 border-[var(--noble-black-900)] animate-pulse"></span>

                <!-- Active Indicator Bar -->
                <div x-show="activePanel === btn.panel"
                    class="absolute left-0 w-1.5 h-5 bg-[var(--stem-green-500)] rounded-r-full shadow-[2px_0_10px_rgba(34,211,238,0.6)]">
                </div>
            </button>
        </template>
    </div>

    <div class="flex-1"></div>

    <!-- New Session -->
    <div class="px-3 md:px-4">
        <button @click="newSession(); sidebarOpen = false" title="开启新对话"
            class="w-full md:w-full h-12 md:h-11 rounded-xl flex items-center justify-center gap-3.5 bg-[var(--stem-green-500)] text-[var(--noble-black-900)] hover:bg-[var(--stem-green-400)] transition-all duration-300 shadow-lg active:scale-95 group">
            <svg class="w-5 h-5 shrink-0 transition-transform group-hover:rotate-90 duration-500" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4" />
            </svg>
            <span class="text-[13px] font-black uppercase tracking-wider">开启新对话</span>
        </button>
    </div>
</div>
