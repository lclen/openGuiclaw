<!-- ═══════════════ MEMORY POOL PANEL ═══════════════ -->
<div x-show="activePanel === 'memory'" class="flex flex-col h-full bg-[var(--noble-black-900)]/40 backdrop-blur-3xl">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-3.5 border-b border-white/5 bg-black/20 shrink-0">
        <div class="flex items-center gap-3">
            <div
                class="w-8 h-8 flex items-center justify-center bg-[var(--noble-black-800)] rounded-lg text-amber-500 border border-white/5 shadow-inner">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <h2 class="text-[14px] font-bold text-white tracking-wide uppercase">长短期记忆池 (Memory)</h2>
                <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight mt-0.5">跨越对话的实体与关系网络</p>
            </div>
        </div>
        <button
            class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-500)] hover:text-amber-400 hover:bg-amber-500/10 rounded-lg transition-all"
            title="归档并重建记忆">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                    d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
        </button>
    </div>

    <!-- Content Empty State -->
    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 relative">
        <!-- Abstract Decoration Background -->
        <div class="absolute inset-0 z-0 select-none pointer-events-none opacity-20">
            <svg width="100%" height="100%">
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5"
                        class="text-[var(--noble-black-600)]"></path>
                </pattern>
                <rect width="100%" height="100%" fill="url(#grid)"></rect>
            </svg>
        </div>

        <!-- Memory List -->
        <div x-show="memoryItems.length > 0" class="relative z-10 space-y-3 pb-6">
            <template x-for="item in memoryItems.slice().reverse()" :key="item.id">
                <div
                    class="px-5 py-4 bg-[var(--noble-black-800)]/80 backdrop-blur-md border border-white/5 rounded-2xl shadow-sm hover:border-amber-500/30 hover:shadow-[0_4px_24px_rgba(245,158,11,0.1)] transition-all group">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <!-- type & time -->
                            <div class="flex items-center justify-between mb-2.5">
                                <div class="flex items-center gap-2">
                                    <span
                                        class="px-2 py-0.5 rounded-md uppercase tracking-widest text-[9px] font-black border shadow-inner"
                                        :class="{
                                              'bg-amber-500/10 text-amber-500 border-amber-500/30': item.type === 'fact',
                                              'bg-blue-500/10 text-blue-400 border-blue-500/30': item.type === 'experience',
                                              'bg-[var(--stem-green-500)]/10 text-[var(--stem-green-500)] border-[var(--stem-green-500)]/30': item.type === 'preference',
                                              'bg-[var(--noble-black-900)] text-[var(--noble-black-400)] border-white/10': !['fact','experience','preference'].includes(item.type)
                                          }" x-text="item.type"></span>
                                    <span
                                        class="text-[10px] text-[var(--noble-black-500)] font-mono font-bold tracking-wider"
                                        x-text="item.created_at || 'Unknown'"></span>
                                </div>
                                <span
                                    class="bg-[var(--noble-black-900)] px-2 py-0.5 rounded border border-white/5 text-[9px] font-bold text-[var(--noble-black-500)] shadow-inner uppercase tracking-widest"
                                    x-text="item.source || 'Auto'"></span>
                            </div>
                            <!-- content -->
                            <p class="text-[12px] text-white leading-relaxed font-medium tracking-wide"
                                x-text="item.content"></p>
                            <!-- tags -->
                            <div class="flex flex-wrap gap-1.5 mt-3" x-show="item.tags && item.tags.length > 0">
                                <template x-for="tag in item.tags" :key="tag">
                                    <span
                                        class="text-[10px] text-[var(--noble-black-300)] font-medium bg-[var(--noble-black-900)] px-2 py-0.5 rounded-md border border-white/5 shadow-inner"
                                        x-text="`#${tag}`"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Content Empty State -->
        <div x-show="memoryItems.length === 0"
            class="flex flex-col items-center justify-center py-20 px-8 text-center relative z-10 w-full max-w-sm mx-auto bg-[var(--noble-black-800)]/80 backdrop-blur-md border border-white/5 rounded-2xl shadow-xl mt-10">
            <div class="relative mb-5">
                <div
                    class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500/20 to-orange-500/20 flex items-center justify-center border border-amber-500/30">
                    <svg class="w-7 h-7 text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
            </div>

            <h3 class="text-[14px] font-black text-white uppercase tracking-widest mb-2">记忆结构尚未固化</h3>
            <p class="text-[11px] font-medium text-[var(--noble-black-400)] leading-relaxed max-w-[250px]">
                与大语言模型交互并持续对话，相关的长短期实体属性将会在此处进行结晶。
            </p>

            <button @click="activePanel = 'chat'"
                class="mt-6 px-5 py-2.5 bg-[var(--noble-black-900)] border border-white/10 hover:border-amber-500/40 rounded-xl text-[10px] font-bold text-[var(--noble-black-300)] hover:text-amber-400 uppercase tracking-widest transition-all shadow-inner hover:shadow-amber-500/10 active:scale-95 group">
                <span class="flex items-center gap-2">
                    前往终端会话 <span class="group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </button>
        </div>
    </div>
</div>
