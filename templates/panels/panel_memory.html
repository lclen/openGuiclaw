<!-- ═══════════════ MEMORY POOL PANEL ═══════════════ -->
<div x-show="activePanel === 'memory'" class="flex flex-col h-full bg-[var(--noble-black-900)]/40 backdrop-blur-3xl">

    <!-- Header -->
    <div class="flex items-center justify-between px-6 py-3.5 border-b border-white/5 bg-black/20 shrink-0">
        <div class="flex items-center gap-3">
            <div
                class="w-8 h-8 flex items-center justify-center bg-[var(--noble-black-800)] rounded-lg text-amber-500 border border-white/5 shadow-inner">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
            </div>
            <div>
                <h2 class="text-[14px] font-bold text-white tracking-wide uppercase">长短期记忆池 (Memory)</h2>
                <div class="flex items-center gap-2 mt-0.5">
                    <p class="text-[var(--noble-black-400)] text-[11px] font-medium tracking-tight">跨越对话的实体与关系网络</p>
                    <span x-show="selectedMemoryCount > 0" x-transition.opacity
                        class="text-[10px] text-amber-500 font-bold bg-amber-500/10 px-1.5 py-0.5 rounded border border-amber-500/20">
                        已选 <span x-text="selectedMemoryCount"></span> 项
                    </span>
                </div>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <!-- Batch delete button, shown when items are selected -->
            <button x-show="selectedMemoryCount > 0" x-transition @click="batchDeleteMemories()"
                class="flex items-center gap-1.5 px-3 py-1.5 text-[11px] font-bold text-red-400 bg-red-400/10 hover:bg-red-400/20 hover:text-red-300 border border-red-400/20 rounded-lg transition-colors cursor-pointer"
                title="删除选中的记忆">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
                <span>删除选中</span>
            </button>

            <!-- Toggle select all -->
            <button x-show="memoryItems.length > 0" @click="toggleMemorySelectAll()"
                class="flex items-center gap-1.5 px-3 py-1.5 text-[11px] font-bold text-[var(--noble-black-400)] hover:text-white bg-[var(--noble-black-800)]/50 hover:bg-[var(--noble-black-700)] border border-white/5 rounded-lg transition-colors cursor-pointer"
                title="全选/取消全选">
                <svg x-show="allMemoriesSelected" class="w-3.5 h-3.5 text-amber-500" fill="currentColor"
                    viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"
                        clip-rule="evenodd" />
                </svg>
                <svg x-show="!allMemoriesSelected" class="w-3.5 h-3.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span x-text="allMemoriesSelected ? '取消全选' : '全选'"></span>
            </button>

            <button @click="loadMemories()"
                class="w-8 h-8 flex items-center justify-center text-[var(--noble-black-500)] hover:text-amber-400 hover:bg-amber-500/10 rounded-lg transition-all cursor-pointer"
                title="刷新记忆">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                        d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Content Empty State / List Area -->
    <div class="flex-1 overflow-y-auto custom-scrollbar px-6 py-5 relative">
        <!-- Abstract Decoration Background -->
        <div class="absolute inset-0 z-0 select-none pointer-events-none opacity-20">
            <svg width="100%" height="100%">
                <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
                    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="currentColor" stroke-width="0.5"
                        class="text-[var(--noble-black-600)]"></path>
                </pattern>
                <rect width="100%" height="100%" fill="url(#grid)"></rect>
            </svg>
        </div>

        <!-- Memory List -->
        <div x-show="memoryItems.length > 0" class="relative z-10 space-y-3 pb-6">
            <template x-for="item in memoryItems.slice().reverse()" :key="item.id">
                <div class="relative px-5 py-4 bg-[var(--noble-black-800)]/80 backdrop-blur-md border rounded-2xl shadow-sm transition-all group overflow-hidden"
                    :class="item._selected ? 'border-amber-500/50 shadow-[0_4px_24px_rgba(245,158,11,0.15)] ring-1 ring-amber-500/30' : 'border-white/20 hover:border-white/40 hover:shadow-[0_4px_24px_rgba(255,255,255,0.05)]'">

                    <!-- Type Indicator Line -->
                    <div class="absolute left-0 top-0 bottom-0 w-1 bg-opacity-80" :class="{
                             'bg-amber-500': item.type === 'fact',
                             'bg-blue-500': item.type === 'experience',
                             'bg-[var(--stem-green-500)]': item.type === 'preference',
                             'bg-[var(--noble-black-500)]': !['fact','experience','preference'].includes(item.type)
                         }"></div>

                    <div class="flex items-start gap-4 ml-1">
                        <!-- Checkbox -->
                        <div class="mt-1 flex-shrink-0">
                            <label class="cursor-pointer relative flex items-center group/cb">
                                <input type="checkbox" x-model="item._selected" class="peer sr-only">
                                <div
                                    class="w-4 h-4 rounded border border-[var(--noble-black-600)] peer-checked:bg-amber-500 peer-checked:border-amber-500 group-hover/cb:border-amber-400 transition-colors flex items-center justify-center">
                                    <svg class="w-3 h-3 text-black opacity-0 peer-checked:opacity-100 transition-opacity"
                                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                            d="M5 13l4 4L19 7"></path>
                                    </svg>
                                </div>
                            </label>
                        </div>

                        <div class="flex-1 min-w-0">
                            <!-- Header Info -->
                            <div class="flex items-center justify-between mb-2.5">
                                <div class="flex items-center gap-2">
                                    <span
                                        class="px-2 py-0.5 rounded-md uppercase tracking-widest text-[9px] font-black border shadow-inner"
                                        :class="{
                                              'bg-amber-500/10 text-amber-500 border-amber-500/30': item.type === 'fact',
                                              'bg-blue-500/10 text-blue-400 border-blue-500/30': item.type === 'experience',
                                              'bg-[var(--stem-green-500)]/10 text-[var(--stem-green-500)] border-[var(--stem-green-500)]/30': item.type === 'preference',
                                              'bg-[var(--noble-black-900)] text-[var(--noble-black-400)] border-white/10': !['fact','experience','preference'].includes(item.type)
                                          }"
                                        x-text="item.type === 'fact' ? '事实' : (item.type === 'experience' ? '经历' : (item.type === 'preference' ? '偏好' : item.type))"></span>
                                    <span
                                        class="text-[10px] text-[var(--noble-black-500)] font-mono font-bold tracking-wider"
                                        x-text="item.created_at || 'Unknown'"></span>
                                </div>

                                <!-- Action Buttons (Hover) -->
                                <div
                                    class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button @click.stop="startEditMemory(item)" x-show="!item._editing"
                                        class="p-1 text-[var(--noble-black-400)] hover:text-amber-400 hover:bg-amber-400/10 rounded cursor-pointer transition-colors"
                                        title="编辑记忆">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
                                        </svg>
                                    </button>
                                    <button @click.stop="deleteMemory(item.id)" x-show="!item._editing"
                                        class="p-1 text-[var(--noble-black-400)] hover:text-red-400 hover:bg-red-400/10 rounded cursor-pointer transition-colors"
                                        title="删除记忆">
                                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                                d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                    <span x-show="!item._editing"
                                        class="bg-[var(--noble-black-900)] px-2 py-0.5 rounded border border-white/5 text-[9px] font-bold text-[var(--noble-black-500)] shadow-inner uppercase tracking-widest ml-2"
                                        x-text="item.source || 'Auto'"></span>
                                </div>
                            </div>

                            <!-- Content Area -->
                            <div x-show="!item._editing">
                                <p class="text-[12px] text-white leading-relaxed font-medium tracking-wide whitespace-pre-wrap"
                                    x-text="item.content"></p>
                            </div>

                            <!-- Edit Area -->
                            <div x-show="item._editing" class="mt-2 space-y-2">
                                <textarea x-model="item._editBuffer" rows="3"
                                    class="w-full bg-[var(--noble-black-900)] text-white text-[12px] rounded-lg border border-amber-500/30 p-2.5 focus:outline-none focus:border-amber-400 focus:ring-1 focus:ring-amber-500/50 transition-all resize-y custom-scrollbar placeholder-[var(--noble-black-500)]"></textarea>
                                <div class="flex items-center justify-end gap-2">
                                    <button @click="cancelEditMemory(item)"
                                        class="px-2.5 py-1 text-[10px] font-bold text-[var(--noble-black-400)] hover:text-white bg-[var(--noble-black-800)]/80 hover:bg-[var(--noble-black-700)] rounded m-0 cursor-pointer border border-white/5 transition-colors">
                                        取消
                                    </button>
                                    <button @click="saveMemoryEdit(item)"
                                        class="px-3 py-1 text-[10px] font-bold text-black bg-amber-500 hover:bg-amber-400 rounded m-0 cursor-pointer transition-colors shadow-[0_0_10px_rgba(245,158,11,0.2)]">
                                        保存修改
                                    </button>
                                </div>
                            </div>

                            <!-- Tags -->
                            <div class="flex flex-wrap gap-1.5 mt-3" x-show="item.tags && item.tags.length > 0">
                                <template x-for="tag in item.tags" :key="tag">
                                    <span
                                        class="text-[10px] text-[var(--noble-black-400)] font-medium bg-[var(--noble-black-900)]/80 px-2 py-0.5 rounded border border-white/5 shadow-inner"
                                        x-text="`#${tag}`"></span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <!-- Content Empty State -->
        <div x-show="memoryItems.length === 0"
            class="flex flex-col items-center justify-center py-20 px-8 text-center relative z-10 w-full max-w-sm mx-auto bg-[var(--noble-black-800)]/80 backdrop-blur-md border border-white/5 rounded-2xl shadow-xl mt-10">
            <div class="relative mb-5">
                <div
                    class="w-16 h-16 rounded-2xl bg-gradient-to-br from-amber-500/20 to-orange-500/20 flex items-center justify-center border border-amber-500/30">
                    <svg class="w-7 h-7 text-amber-500 drop-shadow-[0_0_8px_rgba(245,158,11,0.5)]" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                    </svg>
                </div>
            </div>

            <h3 class="text-[14px] font-black text-white uppercase tracking-widest mb-2">记忆结构尚未固化</h3>
            <p class="text-[11px] font-medium text-[var(--noble-black-400)] leading-relaxed max-w-[250px]">
                与大语言模型交互并持续对话，相关的长短期实体属性将会在此处进行结晶。
            </p>

            <button @click="activePanel = 'chat'"
                class="mt-6 px-5 py-2.5 bg-[var(--noble-black-900)] border border-white/10 hover:border-amber-500/40 rounded-xl text-[10px] font-bold text-[var(--noble-black-300)] hover:text-amber-400 uppercase tracking-widest transition-all shadow-inner hover:shadow-amber-500/10 active:scale-95 group">
                <span class="flex items-center gap-2">
                    前往终端会话 <span class="group-hover:translate-x-1 transition-transform">→</span>
                </span>
            </button>
        </div>
    </div>
</div>
