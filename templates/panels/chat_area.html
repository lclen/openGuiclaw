<!-- ═══════════════ MAIN CHAT AREA ═══════════════ -->
<div class="flex-1 flex relative bg-transparent overflow-hidden" x-show="activePanel === 'chat'"
    x-transition:enter="duration-300 ease-out" x-transition:enter-start="opacity-0 translate-y-2"
    x-transition:enter-end="opacity-100 translate-y-0" x-data="{ showHistoryPanel: false }">

    <!-- MAIN CHAT COLUMN -->
    <div class="flex-1 flex flex-col relative min-w-0 transition-all duration-300"
        :class="showHistoryPanel ? 'mr-80' : 'mr-0'">
        <!-- Top status bar -->
        <div class="flex items-center justify-between gap-3 px-6 py-4 shrink-0">
            <!-- Left heading -->
            <div class="flex items-center gap-2 px-1">
                <div class="w-1 h-3 rounded-full bg-[var(--stem-green-500)]/40 relative">
                    <div class="absolute inset-0 bg-[var(--stem-green-500)] rounded-full animate-pulse"
                        x-show="agentOnline"></div>
                </div>
                <p class="text-[10px] font-bold text-[var(--noble-black-200)] uppercase tracking-wider">交互终端桥接通道
                    (Terminal)
                </p>
            </div>

            <!-- Right Actions -->
            <div class="flex items-center gap-3">
                <!-- Status indicator -->
                <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-full border bg-[var(--noble-black-800)]/60 backdrop-blur-md shadow-sm"
                    :class="agentOnline ? 'border-[var(--stem-green-500)]/20 text-[var(--stem-green-500)]' : 'border-white/5 text-[var(--noble-black-500)]'">
                    <div class="w-1.5 h-1.5 rounded-full"
                        :class="agentOnline ? 'bg-[var(--stem-green-500)] shadow-[0_0_8px_rgba(34,211,238,0.8)]' : 'bg-[var(--noble-black-500)]'">
                    </div>
                    <span class="text-[9px] font-bold tracking-widest uppercase" x-text="statusText"></span>
                </div>

                <!-- History Toggle Button -->
                <button
                    @click="showHistoryPanel = !showHistoryPanel; if(showHistoryPanel){ $nextTick(() => { document.getElementById('history-panel-container').focus() }) }"
                    class="w-9 h-9 rounded-xl flex items-center justify-center transition-all border shadow-sm group hover:scale-105 active:scale-95"
                    :class="showHistoryPanel ? 'bg-[var(--stem-green-500)]/10 border-[var(--stem-green-500)]/30 text-[var(--stem-green-500)] shadow-[0_0_15px_rgba(182,240,89,0.15)]' : 'bg-[var(--noble-black-800)]/60 border-white/5 text-[var(--noble-black-400)] hover:text-white hover:bg-[var(--noble-black-700)]'">
                    <svg class="w-4 h-4 transition-transform duration-300" :class="showHistoryPanel ? 'scale-110' : ''"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                </button>
            </div>
        </div>

        <!-- Chat messages -->
        <div class="flex-1 flex flex-col pb-2 px-6 min-h-0 relative">
            <div id="chat-container"
                class="flex-1 flex flex-col gap-5 overflow-y-auto custom-scrollbar pb-6 scroll-smooth pr-2">

                <div x-show="messages.length === 0"
                    class="flex-1 flex flex-col items-center justify-center text-center opacity-40 select-none">
                    <svg class="w-12 h-12 text-[var(--stem-green-500)] mb-5 opacity-60 drop-shadow-[0_0_15px_rgba(182,240,89,0.5)]"
                        fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                            d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z" />
                    </svg>
                    <p class="text-[14px] font-black text-white uppercase tracking-widest mb-2">神经突触通信已就绪</p>
                    <p class="text-[11px] font-medium text-[var(--noble-black-400)]">随时可以打破沉默</p>
                </div>

                <div class="flex-1 min-h-2"></div>

                <template x-for="msg in messages" :key="msg.id">
                    <div x-show="msg.role !== 'visual_log'"
                        class="chat-bubble flex group animate-in slide-in-from-bottom-2 duration-300"
                        :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">

                        <!-- Avatar for assistant -->
                        <div x-show="msg.role === 'assistant'"
                            class="w-9 h-9 rounded-xl bg-[var(--noble-black-800)] border border-[var(--stem-green-500)]/10 flex items-center justify-center mr-3.5 flex-shrink-0 mt-auto shadow-inner shadow-[var(--stem-green-500)]/5 relative z-10 bottom-1">
                            <svg class="w-4 h-4 text-[var(--stem-green-500)]" fill="currentColor" viewBox="0 0 20 20">
                                <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                                    clip-rule="evenodd" />
                            </svg>
                        </div>

                        <div :class="{
                                'bg-[var(--stem-green-500)] text-[var(--noble-black-900)] rounded-[22px] rounded-br-sm shadow-[0_4px_20px_rgba(182,240,89,0.25)]': msg.role === 'user',
                                'bg-[var(--noble-black-800)]/80 backdrop-blur-2xl text-[var(--noble-black-100)] rounded-[22px] rounded-tl-sm border border-[var(--noble-black-700)]/60 shadow-[0_8px_30px_rgba(0,0,0,0.5)] shadow-inner': msg.role === 'assistant'
                            }" class="px-5 py-3.5 max-w-[82%] text-[13px] leading-relaxed transition-all relative">

                            <!-- Decoration highlight for user -->
                            <template x-if="msg.role === 'user'">
                                <div
                                    class="absolute inset-0 rounded-[22px] rounded-br-sm border border-white/20 pointer-events-none">
                                </div>
                            </template>

                            <!-- Decoration highlight for assistant -->
                            <template x-if="msg.role === 'assistant'">
                                <div
                                    class="absolute inset-0 rounded-[22px] rounded-tl-sm shadow-[inset_0_1px_0_rgba(255,255,255,0.05),inset_0_0_20px_rgba(255,255,255,0.02)] pointer-events-none">
                                </div>
                            </template>

                            <!-- Thinking Block -->
                            <template x-if="msg.thinkingHtml">
                                <div
                                    class="mb-3 p-3 rounded-xl bg-black/30 border border-white/5 shadow-inner relative z-10">
                                    <div class="flex items-center text-[10px] text-[var(--noble-black-400)] font-bold uppercase tracking-widest cursor-pointer group/think"
                                        @click="msg._thinkCollapsed = !msg._thinkCollapsed">
                                        <svg class="w-3.5 h-3.5 mr-2 transform transition-transform text-[var(--stem-green-500)]/70"
                                            :class="msg._thinkCollapsed ? '-rotate-90' : 'rotate-0'" fill="none"
                                            stroke="currentColor" viewBox="0 0 24 24">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                                d="M19 9l-7 7-7-7" />
                                        </svg>
                                        <span
                                            class="group-hover/think:text-[var(--stem-green-500)] transition-colors">解析神经元链
                                            (Thinking Process)</span>
                                    </div>
                                    <div x-show="!msg._thinkCollapsed" x-transition.opacity
                                        class="text-[11px] text-[var(--noble-black-400)] mt-2 md-body font-mono border-t border-white/5 pt-2"
                                        x-html="msg.thinkingHtml"></div>
                                </div>
                            </template>

                            <!-- Interleaved Blocks -->
                            <template x-if="msg.blocks && msg.blocks.length > 0">
                                <div class="flex flex-col gap-3 mb-2 relative z-10">
                                    <template x-for="(block, bIndex) in msg.blocks" :key="bIndex">
                                        <div class="w-full">
                                            <template x-if="block.type === 'text'">
                                                <div class="md-body font-medium"
                                                    :class="msg.role === 'user' ? 'text-[var(--noble-black-900)] font-semibold' : ''"
                                                    x-html="block.html"></div>
                                            </template>

                                            <!-- Tool Call Block -->
                                            <template x-if="block.type === 'tool'">
                                                <div
                                                    class="my-2.5 overflow-hidden rounded-xl border border-blue-500/20 bg-blue-500/5 backdrop-blur-sm transition-all hover:bg-blue-500/10 shadow-sm">
                                                    <div class="flex items-center justify-between cursor-pointer px-3.5 py-3 group"
                                                        @click="block._collapsed = !block._collapsed">
                                                        <div class="flex items-center gap-2.5">
                                                            <div class="w-6 h-6 rounded-md flex items-center justify-center border shadow-inner transition-colors"
                                                                :class="block.status === 'done' ? 'bg-[var(--stem-green-500)]/20 text-[var(--stem-green-500)] border-[var(--stem-green-500)]/30' : 'bg-blue-500/20 text-blue-400 border-blue-500/30'">
                                                                <svg x-show="block.status === 'running'"
                                                                    class="w-3.5 h-3.5 animate-spin" fill="none"
                                                                    viewBox="0 0 24 24">
                                                                    <circle class="opacity-25" cx="12" cy="12" r="10"
                                                                        stroke="currentColor" stroke-width="4"></circle>
                                                                    <path class="opacity-75" fill="currentColor"
                                                                        d="M4 12a8 8 0 018-8v8H4z"></path>
                                                                </svg>
                                                                <svg x-show="block.status === 'done'"
                                                                    class="w-3.5 h-3.5" fill="none"
                                                                    stroke="currentColor" viewBox="0 0 24 24">
                                                                    <path stroke-linecap="round" stroke-linejoin="round"
                                                                        stroke-width="2.5" d="M5 13l4 4L19 7" />
                                                                </svg>
                                                            </div>
                                                            <span
                                                                class="text-[10px] font-bold tracking-widest text-white uppercase opacity-90"
                                                                x-text="block.name"></span>
                                                        </div>
                                                        <div class="flex items-center gap-2">
                                                            <span class="text-[9px] font-bold uppercase tracking-widest"
                                                                :class="block.status === 'running' ? 'text-blue-400' : 'text-[var(--stem-green-500)]'"
                                                                x-text="block.status === 'running' ? '执行队列' : '响应完毕'"></span>
                                                            <svg class="w-3.5 h-3.5 text-[var(--noble-black-400)] group-hover:text-white transform transition-transform duration-300"
                                                                :class="block._collapsed ? '-rotate-90' : 'rotate-0'"
                                                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="2.5" d="M19 9l-7 7-7-7" />
                                                            </svg>
                                                        </div>
                                                    </div>

                                                    <div x-show="!block._collapsed"
                                                        class="px-4 pb-4 space-y-3 animate-in slide-in-from-top-1 duration-200">
                                                        <!-- Params -->
                                                        <div class="relative">
                                                            <p
                                                                class="text-[9px] text-blue-400/80 uppercase tracking-widest font-bold mb-1.5 ml-1 flex items-center gap-1.5">
                                                                <span
                                                                    class="w-1.5 h-1.5 rounded-full bg-blue-500/80"></span>
                                                                传入载体参数 (args)
                                                            </p>
                                                            <div class="bg-[var(--noble-black-950)] p-3 rounded-xl border border-white/5 overflow-x-auto text-[10px] font-mono text-blue-200/80 whitespace-pre-wrap break-all shadow-inner"
                                                                x-text="block.paramsStr"></div>
                                                        </div>
                                                        <!-- Results -->
                                                        <template x-if="block.resultStr">
                                                            <div class="relative mt-3 pt-3 border-t border-white/5">
                                                                <p
                                                                    class="text-[9px] text-[var(--stem-green-500)]/80 uppercase tracking-widest font-bold mb-1.5 ml-1 flex items-center gap-1.5">
                                                                    <span
                                                                        class="w-1.5 h-1.5 rounded-full bg-[var(--stem-green-500)]/80"></span>
                                                                    抛出反馈载体 (result)
                                                                </p>
                                                                <div class="bg-[var(--noble-black-950)] p-3 rounded-xl border border-[var(--stem-green-500)]/10 overflow-x-auto text-[10px] font-mono text-green-200/80 whitespace-pre-wrap break-all shadow-inner"
                                                                    x-text="block.resultStr"></div>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </div>
                                            </template>

                                            <!-- Ask User Interactive Block -->
                                            <template x-if="block.type === 'ask_user'">
                                                <div
                                                    class="my-3 p-4 bg-orange-500/10 border border-orange-500/30 rounded-2xl shadow-xl flex flex-col items-center">
                                                    <div
                                                        class="w-10 h-10 shadow-lg rounded-full bg-orange-500/20 border-2 border-orange-500 flex items-center justify-center text-orange-400 mb-3 hover:scale-110 transition-transform">
                                                        <svg class="w-5 h-5 flex-shrink-0" fill="none"
                                                            stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                                stroke-width="2.5"
                                                                d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                                                        </svg>
                                                    </div>
                                                    <p class="text-[13px] font-bold text-orange-100 mb-4 text-center leading-relaxed"
                                                        x-text="block.question"></p>

                                                    <!-- Action Buttons (hidden if answered) -->
                                                    <div x-show="!block.answered"
                                                        class="grid grid-cols-2 gap-2.5 w-full">
                                                        <template x-for="opt in block.options" :key="opt.id">
                                                            <button @click="submitAskUserChoice(msg, block, opt)"
                                                                class="w-full text-center px-4 py-3 bg-[var(--noble-black-800)] hover:bg-orange-500 border border-white/5 hover:border-orange-400 rounded-xl text-[12px] font-bold text-white hover:text-black transition-all shadow-md hover:shadow-orange-500/30 active:scale-95 text-ellipsis overflow-hidden">
                                                                <span x-text="opt.label"></span>
                                                            </button>
                                                        </template>
                                                    </div>

                                                    <!-- Result feedback (shown after answered) -->
                                                    <div x-show="block.answered"
                                                        class="mt-2 text-center bg-black/40 px-4 py-2.5 rounded-xl border border-white/5 shadow-inner">
                                                        <div class="flex items-center justify-center gap-1.5 mb-0.5">
                                                            <svg class="w-3.5 h-3.5 text-[var(--stem-green-500)]"
                                                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="3" d="M5 13l4 4L19 7" />
                                                            </svg>
                                                            <span
                                                                class="text-[10px] text-[var(--noble-black-400)] font-bold tracking-widest uppercase">意向已采集</span>
                                                        </div>
                                                        <span class="text-[13px] text-white font-black"
                                                            x-text="block.resultStr"></span>
                                                    </div>
                                                </div>
                                            </template>

                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- Fallback for older messages -->
                            <template x-if="!msg.blocks || msg.blocks.length === 0">
                                <div class="md-body font-medium relative z-10"
                                    :class="msg.role === 'user' ? 'text-[var(--noble-black-900)] font-semibold' : ''"
                                    x-show="msg.html || msg.content" x-html="msg.html || msg.content">
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Visual Log (Unobtrusive) -->
                    <div x-show="msg.role === 'visual_log'" class="flex justify-center my-2">
                        <div
                            class="px-5 py-2 bg-[var(--noble-black-900)]/80 border border-white/5 rounded-full backdrop-blur-md max-w-[85%] shadow-sm hover:border-[var(--stem-green-500)]/20 transition-colors">
                            <div
                                class="text-[10px] font-bold tracking-wide text-[var(--noble-black-400)] group relative overflow-hidden flex items-center justify-center gap-2">
                                <span
                                    class="w-1.5 h-1.5 rounded-full bg-[var(--stem-green-500)]/40 shadow-[0_0_8px_rgba(182,240,89,0.4)]"></span>
                                <div class="md-body inline flex items-center"
                                    x-html="msg.html || mdRender(msg.content || '')"></div>
                            </div>
                        </div>
                    </div>
                </template>
            </div>
        </div>

        <!-- Input area -->
        <div class="px-6 pb-6 pt-2 shrink-0 relative z-20">
            <div id="chat-input-area"
                class="rounded-3xl p-2.5 flex flex-col gap-2 shadow-[0_8px_32px_rgba(0,0,0,0.4)] backdrop-blur-2xl bg-[var(--noble-black-800)]/90 border border-[var(--noble-black-600)] relative transition-all duration-300 focus-within:border-[var(--stem-green-500)]/50 focus-within:shadow-[0_8px_32px_rgba(182,240,89,0.15)] group/container"
                :class="isDragOver ? 'border-[var(--stem-green-500)]/60 bg-[var(--stem-green-500)]/10' : ''"
                @dragover.prevent="isDragOver = true" @dragleave.prevent="isDragOver = false"
                @drop.prevent="handleDrop($event)" @paste="handlePaste($event)">

                <div
                    class="absolute inset-x-4 top-0 h-px bg-gradient-to-r from-transparent via-white/10 to-transparent opacity-0 group-focus-within/container:opacity-100 transition-opacity">
                </div>

                <!-- Drag-over overlay hint -->
                <div x-show="isDragOver"
                    class="absolute inset-0 rounded-3xl flex items-center justify-center pointer-events-none z-10 border-2 border-dashed border-[var(--stem-green-500)]/50 bg-[var(--noble-black-900)]/80 backdrop-blur-sm">
                    <span
                        class="text-[var(--stem-green-500)] text-[12px] font-black uppercase tracking-widest bg-[var(--noble-black-900)] px-5 py-2 rounded-xl border border-[var(--stem-green-500)]/30 shadow-xl">松开装填影像视觉</span>
                </div>

                <!-- Pending image preview -->
                <div x-show="pendingImage" class="flex flex-col gap-2 px-3 pt-2">
                    <div class="relative group w-fit">
                        <img :src="pendingImage"
                            class="h-16 w-16 md:h-20 md:w-20 rounded-xl object-cover border-2 border-[var(--noble-black-600)] shadow-lg group-hover:border-[var(--stem-green-500)]/50 transition-colors" />
                        <button @click="pendingImage = null; pendingImageFile = null"
                            class="absolute -top-2 -right-2 w-5 h-5 bg-rose-500 hover:bg-rose-400 border border-[var(--noble-black-900)] rounded-full text-white text-[10px] flex items-center justify-center shadow-md scale-90 group-hover:scale-110 transition-transform">
                            <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3"
                                    d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                </div>

                <!-- Slash Command Menu -->
                <div x-show="showCommandMenu && filteredCommands.length > 0" @click.outside="showCommandMenu = false"
                    class="absolute bottom-[calc(100%+12px)] left-0 w-full mb-1 bg-[var(--noble-black-800)]/95 backdrop-blur-3xl border border-white/10 rounded-2xl shadow-[0_16px_48px_rgba(0,0,0,0.5)] overflow-hidden z-50 py-1">
                    <template x-for="(cmd, index) in filteredCommands" :key="index">
                        <div @click="selectCommand(cmd)" @mouseenter="commandSelectedIndex = index"
                            :class="commandSelectedIndex === index ? 'bg-[var(--stem-green-500)]/10' : 'hover:bg-white/5'"
                            class="px-5 py-3 cursor-pointer flex items-center justify-between border-b border-white/5 last:border-b-0 transition-all select-none group">
                            <div class="flex gap-3 items-center w-full min-w-0">
                                <div class="w-8 h-8 rounded-lg flex items-center justify-center text-[14px] shrink-0 border transition-all"
                                    :class="commandSelectedIndex === index ? 'bg-[var(--stem-green-500)] border-transparent text-[var(--noble-black-900)] shadow-lg shadow-[var(--stem-green-500)]/30' : 'bg-[var(--noble-black-900)] border-white/5 text-white/50'">
                                    <span x-text="cmd.icon"></span>
                                </div>
                                <div class="flex flex-col min-w-0 flex-1">
                                    <span class="font-mono text-[12px] font-black tracking-tight"
                                        :class="commandSelectedIndex === index ? 'text-[var(--stem-green-500)]' : 'text-white'"
                                        x-text="cmd.command"></span>
                                    <span
                                        class="text-[10px] text-[var(--noble-black-400)] font-medium leading-tight truncate mt-0.5"
                                        x-text="cmd.desc"></span>
                                </div>
                            </div>
                            <span
                                class="text-[9px] font-bold text-[var(--noble-black-500)] ml-4 bg-[var(--noble-black-900)] px-2 py-0.5 rounded shadow-inner tracking-widest border border-white/5 group-hover:bg-[var(--noble-black-800)] transition-colors">↵</span>
                        </div>
                    </template>
                </div>

                <div class="flex items-end gap-2 p-1">
                    <div class="flex-1 px-3 py-1.5 md:py-2">
                        <textarea x-model="inputText" @keydown.enter.prevent="handleEnter($event)"
                            @keydown.up.prevent="navigateCommand(-1, $event)"
                            @keydown.down.prevent="navigateCommand(1, $event)"
                            @input="handleInput($event); autoResize($el)" :disabled="isReceiving"
                            placeholder="构建意图载体... (输入 / 触发捷径，或装入视觉碎片)" rows="1"
                            class="w-full bg-transparent outline-none text-white text-[13px] placeholder-[var(--noble-black-500)] resize-none leading-relaxed disabled:opacity-40 font-medium"></textarea>
                    </div>
                    <button @click="isReceiving ? abortReceiving() : sendMessage()"
                        :disabled="!isReceiving && !inputText.trim() && !pendingImage"
                        :class="isReceiving ? 'bg-[var(--noble-black-900)] text-rose-500 hover:text-white border border-rose-500 border-dashed hover:bg-rose-500 shadow-[0_0_15px_rgba(244,63,94,0.3)]' : 'bg-[var(--stem-green-500)] text-[var(--noble-black-900)] hover:bg-[#c2f66d] shadow-[0_4px_16px_rgba(182,240,89,0.25)]'"
                        :title="isReceiving ? '中止串流' : '发射命令'"
                        class="p-3.5 disabled:opacity-30 disabled:hover:scale-100 disabled:shadow-none rounded-2xl font-black transition-all duration-300 transform md:hover:scale-105 active:scale-95 flex-shrink-0 outline-none">
                        <template x-if="!isReceiving">
                            <svg class="w-5 h-5 object-contain ml-0.5" fill="none" stroke="currentColor"
                                viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                    d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                            </svg>
                        </template>
                        <template x-if="isReceiving">
                            <svg class="w-5 h-5 animate-pulse" fill="currentColor" viewBox="0 0 24 24">
                                <rect x="6" y="6" width="12" height="12" rx="3" />
                            </svg>
                        </template>
                    </button>
                </div>
            </div>
            <p
                class="text-[var(--noble-black-500)] text-[10px] font-bold text-center mt-3 uppercase tracking-widest hidden md:block select-none">
                <span class="mr-3">Enter <span class="text-[var(--noble-black-600)] font-normal">交汇信息流</span></span>
                <span class="mr-3">Shift+Enter <span
                        class="text-[var(--noble-black-600)] font-normal">多重指令行</span></span>
                <span>流引擎运转中可敲击中断</span>
            </p>
        </div>
    </div>

    <!-- HISTORY SIDE PANEL (Slide over or beside) -->
    <div x-show="showHistoryPanel" id="history-panel-container" tabindex="-1"
        x-transition:enter="transition ease-out duration-300 transform"
        x-transition:enter-start="translate-x-full opacity-0" x-transition:enter-end="translate-x-0 opacity-100"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="translate-x-0 opacity-100" x-transition:leave-end="translate-x-full opacity-0"
        class="absolute right-0 top-0 h-full w-80 flex-shrink-0 border-l border-white/5 bg-[var(--noble-black-900)]/95 backdrop-blur-3xl flex flex-col z-30 shadow-[-20px_0_40px_rgba(0,0,0,0.4)] outline-none">

        <!-- Header -->
        <div class="px-5 py-4 border-b border-white/5 flex items-center justify-between shrink-0 h-[68px]">
            <div>
                <p class="text-[13px] font-black text-white uppercase tracking-widest flex items-center gap-2">
                    <svg class="w-4 h-4 text-[var(--stem-green-500)]" fill="none" stroke="currentColor"
                        viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    历史序列 (History)
                </p>
                <p class="text-[var(--noble-black-500)] text-[10px] font-bold tracking-wider mt-1 ml-6"
                    x-text="`网络节点 ${sessions.length} 个`"></p>
            </div>

            <button @click="showHistoryPanel = false"
                class="w-8 h-8 rounded-lg flex items-center justify-center text-[var(--noble-black-500)] hover:text-white hover:bg-[var(--noble-black-800)] transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>

        <!-- History List -->
        <div class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-2.5">
            <template x-for="s in sessions" :key="s.id">
                <button @click="loadSession(s.id); showHistoryPanel = false;" :disabled="isReceiving"
                    class="w-full text-left p-3.5 bg-[var(--noble-black-800)]/40 hover:bg-[var(--noble-black-800)]/80 border border-[var(--noble-black-700)]/50 hover:border-[var(--stem-green-500)]/30 rounded-2xl transition-all disabled:opacity-40 disabled:cursor-not-allowed group relative overflow-hidden shadow-inner flex flex-col gap-2">

                    <div
                        class="absolute left-0 top-0 bottom-0 w-1 bg-[var(--stem-green-500)] rounded-l-2xl opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>

                    <p class="text-[var(--noble-black-100)] text-[12px] font-bold tracking-tight truncate pl-1"
                        x-text="s.title"></p>
                    <div class="flex items-center justify-between pl-1">
                        <p class="text-[var(--noble-black-400)] text-[10px] font-mono font-medium"
                            x-text="`${s.message_count} 链帧节点`"></p>
                        <p class="text-[var(--noble-black-500)] text-[10px] font-bold tracking-widest pl-2"
                            x-text="s.created_at ? s.created_at.slice(5, 16).replace('T', ' ') : ''"></p>
                    </div>
                </button>
            </template>
            <div x-show="sessions.length === 0" class="flex flex-col items-center justify-center py-16 opacity-50">
                <svg class="w-10 h-10 text-[var(--noble-black-500)] mb-4" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
                </svg>
                <p class="text-[11px] font-black text-[var(--noble-black-300)] uppercase tracking-widest">尚无历史通信编档</p>
                <p class="text-[9px] font-medium text-[var(--noble-black-500)] mt-1.5 tracking-wide">进行任意对话即可激活节点存档</p>
            </div>
        </div>
    </div>
</div>
