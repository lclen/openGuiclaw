<!-- ═══════════════ MAIN CHAT AREA ═══════════════ -->
<div class="flex-1 flex flex-col relative" x-show="activePanel === 'chat'">

    <!-- Top status bar -->
    <div class="flex items-center justify-between gap-3 px-4 py-3 border-b border-white/5 bg-white/5">
        <span class="text-white/80 font-semibold text-sm tracking-wide">AI 伴伴</span>
        <div class="flex items-center gap-1.5 rounded-full px-2 py-1">
            <div class="status-dot" :class="agentOnline ? 'bg-green-400' : 'bg-gray-400'"></div>
            <span class="text-white/60 text-xs" x-text="statusText"></span>
        </div>
    </div>

    <!-- Chat messages -->
    <div class="flex-1 flex flex-col pb-3 px-4 min-h-0">
        <div id="chat-container" class="flex-1 flex flex-col gap-2 overflow-y-auto custom-scrollbar">
            <div class="flex-1 min-h-4"></div>
            <template x-for="msg in messages" :key="msg.id">
                <div x-show="msg.role !== 'visual_log'" class="chat-bubble flex"
                    :class="msg.role === 'user' ? 'justify-end' : 'justify-start'">
                    <div x-show="msg.role === 'assistant'"
                        class="w-7 h-7 rounded-full bg-blue-400/30 border border-blue-300/40 flex items-center justify-center mr-2 flex-shrink-0 mt-auto mb-0.5">
                        <svg class="w-3.5 h-3.5 text-blue-200" fill="currentColor" viewBox="0 0 20 20">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z"
                                clip-rule="evenodd" />
                        </svg>
                    </div>
                    <div :class="{
                            'bg-blue-500 text-white rounded-br-sm shadow-blue-500/20': msg.role === 'user',
                            'bg-white/90 backdrop-blur-md text-gray-800 rounded-bl-sm border border-white/20 shadow-xl': msg.role === 'assistant'
                        }"
                        class="px-4 py-2.5 rounded-2xl shadow-lg max-w-[78%] text-sm leading-relaxed transition-all">

                        <!-- Thinking Block -->
                        <template x-if="msg.thinkingHtml">
                            <div class="mb-2 p-2 rounded bg-gray-100/50 border border-gray-200">
                                <div class="flex items-center text-xs text-gray-500 font-semibold cursor-pointer mb-1"
                                    @click="msg._thinkCollapsed = !msg._thinkCollapsed">
                                    <svg class="w-3 h-3 mr-1 transform transition-transform"
                                        :class="msg._thinkCollapsed ? '-rotate-90' : 'rotate-0'" fill="none"
                                        stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M19 9l-7 7-7-7" />
                                    </svg>
                                    <span>思考过程</span>
                                </div>
                                <div x-show="!msg._thinkCollapsed" class="text-xs text-gray-600 md-body"
                                    x-html="msg.thinkingHtml"></div>
                            </div>
                        </template>

                        <!-- Interleaved Blocks -->
                        <template x-if="msg.blocks && msg.blocks.length > 0">
                            <div class="flex flex-col gap-2 mb-2">
                                <template x-for="(block, bIndex) in msg.blocks" :key="bIndex">
                                    <div>
                                        <template x-if="block.type === 'text'">
                                            <div class="md-body" x-html="block.html"></div>
                                        </template>
                                        <template x-if="block.type === 'tool'">
                                            <div
                                                class="my-1.5 overflow-hidden rounded-xl border border-blue-200/50 bg-blue-50/40 backdrop-blur-sm transition-all hover:shadow-md">
                                                <div class="flex items-center justify-between cursor-pointer px-3 py-2 group"
                                                    @click="block._collapsed = !block._collapsed">
                                                    <div class="flex items-center gap-2">
                                                        <div class="w-5 h-5 rounded-lg flex items-center justify-center"
                                                            :class="block.status === 'done' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'">
                                                            <svg x-show="block.status === 'running'"
                                                                class="w-3.5 h-3.5 animate-spin" fill="none"
                                                                viewBox="0 0 24 24">
                                                                <circle class="opacity-25" cx="12" cy="12" r="10"
                                                                    stroke="currentColor" stroke-width="4"></circle>
                                                                <path class="opacity-75" fill="currentColor"
                                                                    d="M4 12a8 8 0 018-8v8H4z"></path>
                                                            </svg>
                                                            <svg x-show="block.status === 'done'" class="w-3.5 h-3.5"
                                                                fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                                <path stroke-linecap="round" stroke-linejoin="round"
                                                                    stroke-width="2" d="M5 13l4 4L19 7" />
                                                            </svg>
                                                        </div>
                                                        <span
                                                            class="text-[11px] font-bold tracking-tight text-blue-700/80 uppercase"
                                                            x-text="block.name"></span>
                                                    </div>
                                                    <div class="flex items-center gap-1.5">
                                                        <span class="text-[10px] text-blue-500/60 font-medium"
                                                            x-text="block.status === 'running' ? '执行中' : '已完成'"></span>
                                                        <svg class="w-3.5 h-3.5 text-blue-400 transform transition-transform duration-300"
                                                            :class="block._collapsed ? '-rotate-90' : 'rotate-0'"
                                                            fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                                            <path stroke-linecap="round" stroke-linejoin="round"
                                                                stroke-width="2" d="M19 9l-7 7-7-7" />
                                                        </svg>
                                                    </div>
                                                </div>
                                                <div x-show="!block._collapsed"
                                                    class="px-3 pb-3 space-y-2 animate-in slide-in-from-top-1 duration-200">
                                                    <div class="relative">
                                                        <div
                                                            class="absolute -left-2 top-0 bottom-0 w-0.5 bg-blue-200/30">
                                                        </div>
                                                        <p class="text-[10px] text-blue-600/50 mb-1 font-semibold ml-1">
                                                            输入参数</p>
                                                        <div class="bg-blue-600/5 p-2 rounded-lg border border-blue-600/5 overflow-x-auto text-[10px] font-mono text-blue-800/70 whitespace-pre-wrap break-all"
                                                            x-text="block.paramsStr"></div>
                                                    </div>
                                                    <template x-if="block.resultStr">
                                                        <div class="relative">
                                                            <div
                                                                class="absolute -left-2 top-0 bottom-0 w-0.5 bg-green-200/30">
                                                            </div>
                                                            <p
                                                                class="text-[10px] text-green-600/50 mb-1 font-semibold ml-1">
                                                                执行结果</p>
                                                            <div class="bg-green-600/5 p-2 rounded-lg border border-green-600/5 overflow-x-auto text-[10px] font-mono text-green-800/70 whitespace-pre-wrap break-all"
                                                                x-text="block.resultStr"></div>
                                                        </div>
                                                    </template>
                                                </div>
                                            </div>
                                        </template>

                                        <!-- Ask User Interactive Block -->
                                        <template x-if="block.type === 'ask_user'">
                                            <div
                                                class="my-2 p-3 bg-indigo-50/80 border border-indigo-200/60 rounded-xl shadow-sm">
                                                <p class="text-[13px] font-semibold text-indigo-900 mb-3 ml-1"
                                                    x-text="block.question"></p>

                                                <!-- Action Buttons (hidden if answered) -->
                                                <div x-show="!block.answered" class="flex flex-col gap-2">
                                                    <template x-for="opt in block.options" :key="opt.id">
                                                        <button @click="submitAskUserChoice(msg, block, opt)"
                                                            class="w-full text-left px-3 py-2 bg-white hover:bg-indigo-100 border border-indigo-200 hover:border-indigo-300 rounded-lg text-sm text-indigo-800 transition-colors shadow-[0_1px_2px_rgba(0,0,0,0.05)] focus:outline-none focus:ring-1 focus:ring-indigo-400">
                                                            <span x-text="opt.label"></span>
                                                        </button>
                                                    </template>
                                                </div>

                                                <!-- Result feedback (shown after answered) -->
                                                <div x-show="block.answered" class="flex items-center gap-2 mt-1 px-1">
                                                    <svg class="w-4 h-4 text-green-500" fill="none"
                                                        stroke="currentColor" viewBox="0 0 24 24">
                                                        <path stroke-linecap="round" stroke-linejoin="round"
                                                            stroke-width="2" d="M5 13l4 4L19 7" />
                                                    </svg>
                                                    <span class="text-xs text-indigo-700/80 font-medium"
                                                        x-text="block.resultStr"></span>
                                                </div>
                                            </div>
                                        </template>

                                    </div>
                                </template>
                            </div>
                        </template>

                        <!-- Fallback for older messages -->
                        <template x-if="!msg.blocks || msg.blocks.length === 0">
                            <div class="md-body mb-2" x-show="msg.html || msg.content" x-html="msg.html || msg.content">
                            </div>
                        </template>
                    </div>
                </div>

                <!-- Visual Log -->
                <div x-show="msg.role === 'visual_log'" class="flex justify-center my-2">
                    <div
                        class="px-4 py-1.5 bg-black/20 border border-white/5 rounded-full backdrop-blur-sm max-w-[85%]">
                        <div class="text-[11px] text-white/50 flex space-x-2 leading-relaxed break-words text-center md-body"
                            x-html="msg.html || mdRender(msg.content || '')">
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <!-- Input area -->
    <div class="px-4 pb-5">
        <div id="chat-input-area"
            class="rounded-2xl p-2 flex flex-col gap-2 shadow-2xl bg-white/5 border border-white/10 relative transition-all"
            :class="isDragOver ? 'border-blue-400/60 bg-blue-500/10' : ''" @dragover.prevent="isDragOver = true"
            @dragleave.prevent="isDragOver = false" @drop.prevent="handleDrop($event)" @paste="handlePaste($event)">

            <!-- Drag-over overlay hint -->
            <div x-show="isDragOver"
                class="absolute inset-0 rounded-2xl flex items-center justify-center pointer-events-none z-10">
                <span class="text-blue-300 text-sm font-medium">松开以发送图片</span>
            </div>

            <!-- Pending image preview -->
            <div x-show="pendingImage" class="flex items-center gap-2 px-2 pt-1">
                <div class="relative group">
                    <img :src="pendingImage"
                        class="h-16 w-auto max-w-[120px] rounded-lg object-cover border border-white/20 shadow" />
                    <button @click="pendingImage = null; pendingImageFile = null"
                        class="absolute -top-1.5 -right-1.5 w-4 h-4 bg-red-500 rounded-full text-white text-[10px] flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                        ✗
                    </button>
                </div>
                <span class="text-white/40 text-xs">图片已就绪，输入说明后发送</span>
            </div>

            <!-- Slash Command Menu -->
            <div x-show="showCommandMenu && filteredCommands.length > 0" @click.outside="showCommandMenu = false"
                class="absolute bottom-full left-0 mb-2 w-full bg-[#1e293b] border border-white/20 rounded-xl shadow-xl overflow-hidden z-50">
                <template x-for="(cmd, index) in filteredCommands" :key="index">
                    <div @click="selectCommand(cmd)" @mouseenter="commandSelectedIndex = index"
                        :class="commandSelectedIndex === index ? 'bg-blue-500/20 text-blue-300' : 'text-white/80 hover:bg-white/5'"
                        class="px-4 py-2.5 cursor-pointer flex items-center justify-between border-b border-white/5 last:border-b-0 transition-colors">
                        <div class="flex gap-2">
                            <div class="bg-white/5 w-6 h-6 rounded flex items-center justify-center text-xs shrink-0">
                                <span x-text="cmd.icon"></span>
                            </div>
                            <div class="flex items-center gap-2 mt-0.5">
                                <span class="font-mono text-sm font-semibold leading-tight" x-text="cmd.command"></span>
                                <span class="text-xs opacity-60 leading-tight mt-0.5" x-text="cmd.desc"></span>
                            </div>
                        </div>
                        <span class="text-[10px] opacity-40">Enter</span>
                    </div>
                </template>
            </div>

            <div class="flex items-end gap-2">
                <div class="flex-1 px-3 py-1.5">
                    <textarea x-model="inputText" @keydown.enter.prevent="handleEnter($event)"
                        @keydown.up.prevent="navigateCommand(-1, $event)"
                        @keydown.down.prevent="navigateCommand(1, $event)" @input="handleInput($event); autoResize($el)"
                        :disabled="isReceiving" placeholder="和我说说话吧... (输入 / 查看快捷指令，可粘贴或拖入图片)" rows="1"
                        class="w-full bg-transparent outline-none text-white text-sm placeholder-white/30 resize-none leading-relaxed disabled:opacity-40"></textarea>
                </div>
                <button @click="isReceiving ? abortReceiving() : sendMessage()"
                    :disabled="!isReceiving && !inputText.trim() && !pendingImage"
                    :class="isReceiving ? 'bg-red-500 hover:bg-red-400' : 'bg-blue-500 hover:bg-blue-400'"
                    :title="isReceiving ? '停止' : '发送'"
                    class="p-2.5 disabled:bg-white/20 disabled:text-white/30 rounded-xl text-white transition-all transform hover:scale-105 active:scale-95 flex-shrink-0 mb-0.5">
                    <template x-if="!isReceiving">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
                        </svg>
                    </template>
                    <template x-if="isReceiving">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24">
                            <rect x="6" y="6" width="12" height="12" rx="2" />
                        </svg>
                    </template>
                </button>
            </div>
        </div>
        <p class="text-white/20 text-xs text-center mt-1.5">Enter 发送 · Shift+Enter 换行 · 生成中可点 ■ 停止</p>
    </div>
</div>
